function saveInvoice() {
  const data = Form.getData();
  if (!data.number || !data.counterparty) { Modal.toast('请填写必填项', 'warning'); return; }
  const list = DB.get('tax_invoices');
  list.unshift({...data, id:DB.genId('FP'), amount:parseFloat(data.amount)||0, tax:parseFloat(data.tax)||0, status:'正常'});
  DB.set('tax_invoices', list);
  document.querySelectorAll('[id^=modal-]').forEach(m=>m.remove());
  Modal.toast('✅ 发票已登记'); renderContent();
}

// ===== 跨系统流程引擎 =====
const WorkflowEngine = {
  key: 'portal_workflows',
  
  getAll() {
    try { return JSON.parse(localStorage.getItem(this.key)) || []; } catch { return []; }
  },
  
  save(list) { localStorage.setItem(this.key, JSON.stringify(list)); },
  
  getById(id) { return this.getAll().find(w => w.id === id); },
  
  advance(workflowId, nextStep, data = {}) {
    const list = this.getAll();
    const wf = list.find(w => w.id === workflowId);
    if (!wf) return;
    const stepDef = wf.steps.find(s => s.key === nextStep);
    if (stepDef) {
      stepDef.status = 'done';
      stepDef.doneAt = new Date().toLocaleString('zh-CN');
      stepDef.doneBy = '席宝';
      Object.assign(stepDef.data || {}, data);
    }
    // Find next pending step
    const currentIdx = wf.steps.findIndex(s => s.key === nextStep);
    if (currentIdx < wf.steps.length - 1) {
      wf.currentStep = wf.steps[currentIdx + 1].key;
    } else {
      wf.status = 'completed';
      wf.currentStep = null;
    }
    wf.updatedAt = new Date().toLocaleString('zh-CN');
    this.save(list);
  },
  
  reject(workflowId, currentStep, reason) {
    const list = this.getAll();
    const wf = list.find(w => w.id === workflowId);
    if (!wf) return;
    const step = wf.steps.find(s => s.key === currentStep);
    if (step) { step.status = 'rejected'; step.rejectReason = reason; }
    wf.status = 'rejected';
    wf.updatedAt = new Date().toLocaleString('zh-CN');
    this.save(list);
  },
  
  startWorkflow(type, title, data) {
    const list = this.getAll();
    const id = 'WF' + Date.now().toString(36).toUpperCase();
    let steps = [];
    
    if (type === 'procurement') {
      steps = [
        {key:'purchase_apply', label:'采购申请', system:'oa-system.html', status:'done', doneAt:new Date().toLocaleString('zh-CN'), doneBy:'席宝', data},
        {key:'purchase_approve', label:'采购审批', system:'oa-system.html', status:'pending'},
        {key:'contract_approve', label:'合同审批', system:'legal-system.html', status:'pending'},
        {key:'seal_apply', label:'用印申请', system:'oa-system.html', status:'pending'},
        {key:'seal_approve', label:'用印审批', system:'oa-system.html', status:'pending'},
        {key:'goods_receive', label:'到货验收', system:'inventory-system.html', status:'pending'},
        {key:'finance_pay', label:'财务付款', system:'finance-system.html', status:'pending'},
        {key:'voucher_entry', label:'凭证入账', system:'finance-system.html', status:'pending'},
      ];
    } else if (type === 'sales') {
      steps = [
        {key:'sales_contract', label:'销售合同', system:'production-system.html', status:'done', doneAt:new Date().toLocaleString('zh-CN'), doneBy:'席宝', data},
        {key:'outbound_apply', label:'出库申请', system:'inventory-system.html', status:'pending'},
        {key:'outbound_approve', label:'出库审核', system:'oa-system.html', status:'pending'},
        {key:'outbound_exec', label:'出库执行', system:'inventory-system.html', status:'pending'},
        {key:'customer_accept', label:'客户验收', system:'production-system.html', status:'pending'},
        {key:'receivable', label:'应收账款', system:'finance-system.html', status:'pending'},
        {key:'bank_confirm', label:'银行到账', system:'finance-system.html', status:'pending'},
      ];
    }
    
    const wf = {
      id, type, title, status: 'active',
      currentStep: steps.length > 1 ? steps[1].key : null,
      createdAt: new Date().toLocaleString('zh-CN'),
      updatedAt: new Date().toLocaleString('zh-CN'),
      steps
    };
    list.unshift(wf);
    this.save(list);
    return wf;
  },
  
  getPendingForSystem(systemFile) {
    return this.getAll().filter(wf => 
      wf.status === 'active' && wf.currentStep &&
      wf.steps.find(s => s.key === wf.currentStep && s.system === systemFile)
    );
  },
  
  renderProgress(wf, compact) {
    if (!wf) return '';
    const steps = wf.steps;
    return `<div style="display:flex;gap:4px;margin-bottom:16px">${steps.map((s, i) => {
      const isDone = s.status === 'done';
      const isCurrent = wf.currentStep === s.key;
      const isRejected = s.status === 'rejected';
      return `<div style="flex:1;text-align:center;padding:6px 4px;background:${isDone ? '#d1fae5' : isRejected ? '#fee2e2' : isCurrent ? '#dbeafe' : 'var(--gray-50)'};border-radius:6px;font-size:10px;border:${isCurrent ? '2px solid var(--primary)' : '1px solid transparent'}">
        <div style="font-size:12px">${isDone ? '✅' : isRejected ? '❌' : isCurrent ? '🔄' : '⏳'}</div>
        <div style="margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.label}</div>
      </div>`;
    }).join('')}</div>`;
  }
};
