.pipeline{display:flex;gap:12px;padding:20px 0}
.pipe-stage{flex:1;background:var(--gray-50);border-radius:8px;padding:12px;text-align:center}
.pipe-stage .count{font-size:24px;font-weight:700;color:var(--primary)}
.pipe-stage .label{font-size:12px;color:var(--gray-500);margin-top:4px}
.pipe-card{background:white;border-radius:6px;padding:10px;margin-top:8px;text-align:left;font-size:13px;box-shadow:var(--shadow-sm);cursor:pointer}
.pipe-card:hover{box-shadow:var(--shadow-md)}
.pipe-card .name{font-weight:600;color:var(--gray-800)}
.pipe-card .info{color:var(--gray-400);font-size:11px;margin-top:2px}
.pipe-card .salary{color:var(--primary);font-weight:600;font-size:12px;margin-top:4px}
.train-card{background:white;border-radius:8px;padding:16px;box-shadow:var(--shadow-sm);display:flex;gap:16px;align-items:center}
.train-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.train-info{flex:1}
.train-info h4{font-size:14px;color:var(--gray-800)}
.train-info p{font-size:12px;color:var(--gray-400);margin-top:2px}
.train-meta{display:flex;gap:16px;margin-top:6px;font-size:12px;color:var(--gray-500)}
.eval-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--gray-100)}
.eval-row:last-child{border-bottom:none}
.eval-name{width:80px;font-weight:600;font-size:14px}
.eval-scores{flex:1;display:flex;gap:8px}
.eval-score{flex:1;text-align:center}
.eval-score .num{font-size:16px;font-weight:700}
.eval-score .label{font-size:11px;color:var(--gray-400)}
</style>

function initAttendanceHistory(){
  if(DB.get('hr_attendance').length>0)return;
  const names=[
    {name:'张伟',dept:'技术研发部'},{name:'李娜',dept:'市场营销部'},{name:'王强',dept:'生产制造部'},
    {name:'刘芳',dept:'财务管理部'},{name:'陈明',dept:'项目交付部'},{name:'赵丽',dept:'人力资源部'},
    {name:'孙磊',dept:'行政综合部'},{name:'周婷',dept:'技术研发部'},{name:'吴刚',dept:'法务合规部'},
    {name:'郑雪',dept:'市场营销部'},{name:'黄海',dept:'生产制造部'},{name:'马丽',dept:'财务管理部'},
    {name:'李强',dept:'技术研发部'},{name:'王芳',dept:'质量管理部'},{name:'刘洋',dept:'采购部'}
  ];
  const records=[];
  for(let d=0;d<14;d++){
    const dt=new Date();dt.setDate(dt.getDate()-d);
    const dateStr=dt.toLocaleDateString('zh-CN');
    const dayOfWeek=dt.getDay();
    if(dayOfWeek===0||dayOfWeek===6)continue;
    names.forEach(n=>{
      const hasLeave=Math.random()<0.08;
      if(hasLeave){
        const types=['年假','病假','事假','调休'];
        records.push({name:n.name,dept:n.dept,date:dateStr,time:'-',type:types[Math.floor(Math.random()*4)],status:'请假'});
        return;
      }
      const baseMin=8*60+Math.floor(Math.random()*50);
      const isLate=baseMin>=8*60+60;
      const h=String(Math.floor(baseMin/60)).padStart(2,'0');
      const m=String(baseMin%60).padStart(2,'0');
      const time=h+':'+m;
      const clockOutMin=17*60+30+Math.floor(Math.random()*60);
      const oh=String(Math.floor(clockOutMin/60)).padStart(2,'0');
      const om=String(clockOutMin%60).padStart(2,'0');
      records.push({name:n.name,dept:n.dept,date:dateStr,time,clockOut:oh+':'+om,status:isLate?'迟到':'正常'});
    });
  }
  DB.set('hr_attendance',records);
}
initAttendanceHistory();

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));

  document.getElementById('page-title').textContent=tabs[tab]||'';

  addBtn.style.display='';
  if(tab==='employee'){addBtn.textContent='➕ 新增员工';addBtn.onclick=showAddEmployee;}

}

function renderAttHistory(){
  const records=DB.get('hr_attendance');
  const dateFilter=document.getElementById('att-hist-date')?.value;
  const kw=document.getElementById('att-hist-kw')?.value?.toLowerCase()||'';
  let list=records;
  if(dateFilter!=='all')list=list.filter(r=>r.date===dateFilter);
  if(kw)list=list.filter(r=>r.name.toLowerCase().includes(kw));
  const grouped={};list.forEach(r=>{if(!grouped[r.date])grouped[r.date]=[];grouped[r.date].push(r);});
  const sortedDates=Object.keys(grouped).sort((a,b)=>new Date(b)-new Date(a));
  if(!sortedDates.length){document.getElementById('att-history-list').innerHTML='<div style="padding:40px;text-align:center;color:var(--gray-400)">暂无考勤记录</div>';return;}
  let html='';
  sortedDates.forEach(date=>{
    const dayR=grouped[date];
    const normal=dayR.filter(r=>r.status==='正常').length;
    const late=dayR.filter(r=>r.status==='迟到').length;
    const leave=dayR.filter(r=>r.status==='请假').length;
    const dt=new Date(date);
    const weekDay=['日','一','二','三','四','五','六'][dt.getDay()];
    html+=`<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-weight:600;font-size:14px;color:var(--gray-800)">${date} <span style="font-weight:400;color:var(--gray-400)">星期${weekDay}</span></div>
        <div style="font-size:12px;color:var(--gray-400)">正常 ${normal} · 迟到 ${late} · 请假 ${leave}</div>
      </div>
      <table><thead><tr><th>姓名</th><th>部门</th><th>签到</th><th>签退</th><th>状态</th></tr></thead>
      <tbody>${dayR.map(r=>`<tr><td>${r.name}</td><td>${r.dept}</td><td>${r.time}</td><td>${r.clockOut||'-'}</td>
      <td><span class="status ${r.status==='正常'?'approved':r.status==='迟到'?'warning':'processing'}">${r.status}${r.type?'('+r.type+')':''}</span></td></tr>`).join('')}</tbody></table>
    </div>`;
  });
  document.getElementById('att-history-list').innerHTML=html;
}
function doCheckIn(){const now=new Date();const time=now.toTimeString().slice(0,5);const records=DB.get('hr_attendance');const today=now.toLocaleDateString('zh-CN');if(records.find(r=>r.date===today&&r.name==='席宝')){Modal.toast('今日已签到','warning');return;}records.unshift({name:'席宝',dept:'人力资源部',date:today,time});DB.set('hr_attendance',records);Modal.toast(`✅ 签到成功 ${time}`);if(currentTab==='attendance')renderContent();}

  el.innerHTML=`<div class="card"><div class="filter-bar"><select><option>全部状态</option><option>待审批</option><option>已通过</option><option>已驳回</option></select><select><option>全部类型</option><option>年假</option><option>事假</option><option>病假</option><option>调休</option></select><button class="btn btn-primary">🔍 搜索</button></div>

  <tbody>${leaveRecords.map(l=>`<tr><td><strong>${l.applicant}</strong></td><td>${l.type}</td><td>${l.start}</td><td>${l.end}</td><td>${l.days}天</td>

// ===== 招聘需求 =====
function renderRecruit(el){
  const list=DB.get('hr_recruits');
  el.innerHTML=`<div class="portal-stats" style="margin-bottom:20px">
    <div class="stat-card"><div class="label">招聘中岗位</div><div class="value">${list.filter(i=>i.status==='招聘中').length}</div></div>
    <div class="stat-card green"><div class="label">累计收到简历</div><div class="value">${Summary.calc(list,'candidates')}</div></div>
    <div class="stat-card orange"><div class="label">待招总人数</div><div class="value">${list.filter(i=>i.status==='招聘中').reduce((s,i)=>s+i.count,0)}</div></div>
  </div>
  <div class="card"><div class="card-body"><table><thead><tr><th>岗位名称</th><th>需求部门</th><th>招聘人数</th><th>薪资范围</th><th>收到简历</th><th>发布日期</th><th>状态</th><th>操作</th></tr></thead>
  <tbody>${list.map(r=>`<tr><td><strong>${r.title}</strong></td><td>${r.dept}</td><td>${r.count}人</td><td>${r.salary}</td><td>${r.candidates}份</td><td>${r.date}</td>
  <td><span class="status ${r.status==='招聘中'?'processing':'rejected'}">${r.status}</span></td>
  <td><a href="#" onclick="viewCandidates('${r.title}');return false" style="color:var(--primary);font-size:13px;text-decoration:none">查看候选人</a></td></tr>`).join('')}</tbody></table></div></div>`;
}
function showNewRecruit(){
  const fields=[{name:'title',label:'岗位名称',full:true,required:true},{name:'dept',label:'需求部门',type:'select',options:depts,required:true},{name:'count',label:'招聘人数',type:'number',required:true},{name:'salary',label:'薪资范围',placeholder:'如 15K-25K',required:true},{name:'requirements',label:'任职要求',type:'textarea',full:true,required:true}];
  const html=Form.render(fields)+`<div style="margin-top:16px;text-align:right"><button class="btn" style="background:#f3f4f6;color:#374151" onclick="Modal.close(this.closest('[id^=modal]').id)">取消</button><button class="btn btn-primary" onclick="saveRecruit()">发布</button></div>`;
  Modal.show('📢 发布招聘需求',html,{width:'560px'});}
function saveRecruit(){const d=Form.getData();if(!d.title){Modal.toast('请填写岗位名称','warning');return;}const l=DB.get('hr_recruits');l.unshift({...d,id:DB.genId('RC'),status:'招聘中',date:new Date().toISOString().slice(0,10),candidates:0});DB.set('hr_recruits',l);document.querySelectorAll('[id^=modal-]').forEach(m=>m.remove());Modal.toast('✅ 已发布');renderContent();}

// ===== 候选人管理 =====
const stageColors={'简历筛选':'pending','笔试中':'processing','待面试':'processing','面试中':'processing','已发Offer':'approved','已入职':'approved','已淘汰':'rejected'};
function renderCandidate(el){
  const list=DB.get('hr_candidates');
  const stages=['简历筛选','笔试中','待面试','面试中','已发Offer','已入职'];
  el.innerHTML=`<div class="pipeline">${stages.map(s=>{const count=list.filter(i=>i.stage===s).length;return `<div class="pipe-stage"><div class="count">${count}</div><div class="label">${s}</div></div>`;}).join('')}</div>
  <div class="card"><div class="card-body"><table><thead><tr><th>候选人</th><th>应聘岗位</th><th>来源</th><th>学历</th><th>经验</th><th>期望薪资</th><th>当前阶段</th><th>操作</th></tr></thead>
  <tbody>${list.map(c=>`<tr><td><strong>${c.name}</strong></td><td>${c.position}</td><td>${c.source}</td><td>${c.education}</td><td>${c.experience}</td><td>${c.salary}</td>
  <td><span class="status ${stageColors[c.stage]||'pending'}">${c.stage}</span></td>
  <td><a href="#" onclick="viewCandidate('${c.id}');return false" style="color:var(--primary);font-size:13px;text-decoration:none">查看</a> ${c.stage!=='已入职'&&c.stage!=='已淘汰'?`<a href="#" onclick="advanceCandidate('${c.id}');return false" style="color:var(--success);font-size:13px;text-decoration:none;margin-left:4px">推进</a>`:''}</td></tr>`).join('')}</tbody></table></div></div>`;
}
function showNewCandidate(){
  const fields=[{name:'name',label:'姓名',required:true},{name:'position',label:'应聘岗位',required:true},{name:'source',label:'来源',type:'select',options:['BOSS直聘','拉勾网','猎聘','智联招聘','内部推荐','校招'],required:true},{name:'phone',label:'手机',required:true},{name:'education',label:'学历',required:true},{name:'experience',label:'工作经验',required:true},{name:'salary',label:'期望薪资',required:true}];
  const html=Form.render(fields)+`<div style="margin-top:16px;text-align:right"><button class="btn" style="background:#f3f4f6;color:#374151" onclick="Modal.close(this.closest('[id^=modal]').id)">取消</button><button class="btn btn-primary" onclick="saveCandidate()">添加</button></div>`;
  Modal.show('👤 新增候选人',html,{width:'520px'});}
function saveCandidate(){const d=Form.getData();if(!d.name){Modal.toast('请填写姓名','warning');return;}const l=DB.get('hr_candidates');l.unshift({...d,id:DB.genId('CD'),stage:'简历筛选'});DB.set('hr_candidates',l);document.querySelectorAll('[id^=modal-]').forEach(m=>m.remove());Modal.toast('✅ 已添加');renderContent();}
function advanceCandidate(id){const list=DB.get('hr_candidates');const c=list.find(i=>i.id===id);if(!c)return;const flow=['简历筛选','笔试中','待面试','面试中','已发Offer','已入职'];const idx=flow.indexOf(c.stage);if(idx<flow.length-1){c.stage=flow[idx+1];DB.set('hr_candidates',list);Modal.toast(`✅ 已推进到「${c.stage}」`);renderContent();}}
function viewCandidate(id){const c=DB.get('hr_candidates').find(i=>i.id===id);if(!c)return;const resume=resumeDB[id]||{};
  const skillsHtml=resume.skills?resume.skills.map(s=>`<span style="display:inline-block;padding:4px 10px;background:var(--gray-100);border-radius:4px;font-size:12px;color:var(--gray-700);margin:2px">${s}</span>`).join(''):'暂无';
  const workHtml=resume.workExp?resume.workExp.map(w=>`<div style="border-left:3px solid var(--primary);padding:8px 12px;margin-bottom:8px;background:var(--gray-50);border-radius:0 6px 6px 0">
    <div style="display:flex;justify-content:space-between;align-items:center"><strong style="font-size:13px;color:var(--gray-800)">${w.company}</strong><span style="font-size:11px;color:var(--gray-400)">${w.period}</span></div>
    <div style="font-size:12px;color:var(--primary);margin:4px 0">${w.role}</div>
    <div style="font-size:12px;color:var(--gray-500);line-height:1.6">${w.desc}</div>
  </div>`).join(''):'暂无';
  const eduHtml=resume.eduExp?resume.eduExp.map(e=>`<div style="display:flex;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid var(--gray-100)">
    <div style="width:36px;height:36px;background:var(--primary);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">🎓</div>
    <div><div style="font-weight:600;font-size:13px;color:var(--gray-800)">${e.school}</div>
    <div style="font-size:12px;color:var(--gray-400)">${e.major} | ${e.degree} | ${e.period}</div></div>
  </div>`).join(''):'暂无';
  const html=`<div style="max-height:65vh;overflow-y:auto">
    <div style="background:linear-gradient(135deg,#1a56db,#3b82f6);color:white;padding:24px;border-radius:10px;margin-bottom:20px;display:flex;gap:20px;align-items:center">
      <div style="width:64px;height:64px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700">${c.name[0]}</div>
      <div><div style="font-size:20px;font-weight:700">${c.name}</div>
      <div style="font-size:14px;opacity:0.9;margin-top:4px">${c.position} | ${c.education}</div>
      <div style="font-size:12px;opacity:0.7;margin-top:4px">${resume.birth||''} ${resume.address?'| '+resume.address:''} | ${c.phone}</div></div>
      <div style="margin-left:auto;text-align:right"><div style="font-size:12px;opacity:0.7">期望薪资</div><div style="font-size:22px;font-weight:700">${c.salary}</div>
      <span class="status ${stageColors[c.stage]||'pending'}" style="margin-top:8px">${c.stage}</span></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:16px">💼</span><h4 style="font-size:14px;color:var(--gray-800);margin:0">工作经历</h4></div>${workHtml}</div>
      <div><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:16px">🎓</span><h4 style="font-size:14px;color:var(--gray-800);margin:0">教育背景</h4></div>${eduHtml}
        <div style="margin-top:16px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:16px">🛠️</span><h4 style="font-size:14px;color:var(--gray-800);margin:0">技能标签</h4></div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">${skillsHtml}</div></div></div>
    </div>
    ${resume.selfIntro?`<div style="margin-top:20px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:16px">📝</span><h4 style="font-size:14px;color:var(--gray-800);margin:0">自我评价</h4></div>
    <div style="padding:16px;background:var(--gray-50);border-radius:8px;font-size:13px;color:var(--gray-600);line-height:1.8">${resume.selfIntro}</div></div>`:''}
    <div style="margin-top:20px;display:flex;gap:8px;justify-content:flex-end">
      ${c.stage!=='已入职'&&c.stage!=='已淘汰'?`<button class="btn btn-primary" onclick="advanceCandidate('${c.id}');Modal.close(this.closest('[id^=modal]').id)">推进到下一阶段</button>`:''}
      <button class="btn" style="background:var(--gray-100);color:var(--gray-600)" onclick="Modal.close(this.closest('[id^=modal]').id)">关闭</button>
    </div>
  </div>`;
  Modal.show(`📄 候选人简历 - ${c.name}`,html,{width:'720px'});}

// ===== 工资查询 =====
function renderSalary(el){
  const list=DB.get('hr_employees');
  const total=Summary.calc(list,'salary'),avg=total/list.length;
  el.innerHTML=`<div class="portal-stats" style="margin-bottom:20px">
    <div class="stat-card"><div class="label">月薪总额</div><div class="value">¥${(total/10000).toFixed(1)}万</div></div>
    <div class="stat-card green"><div class="label">平均月薪</div><div class="value">¥${avg.toFixed(0).toLocaleString()}</div></div>
  </div><div class="card"><div class="card-body"><table><thead><tr><th>工号</th><th>姓名</th><th>部门</th><th>基本工资</th><th>社保(个人)</th><th>公积金</th><th>个税</th><th>实发工资</th></tr></thead>
  <tbody>${list.map(e=>{const b=e.salary||0;const soc=Math.round(b*0.105);const fund=Math.round(b*0.12);const tx=Math.max(0,Math.round((b-soc-fund-5000)*0.1));const real=b-soc-fund-tx;
    return `<tr><td>${e.id}</td><td><strong>${e.name}</strong></td><td>${e.dept}</td><td>¥${b.toLocaleString()}</td><td style="color:var(--danger)">-¥${soc.toLocaleString()}</td><td style="color:var(--danger)">-¥${fund.toLocaleString()}</td><td style="color:var(--danger)">-¥${tx.toLocaleString()}</td><td style="color:var(--success);font-weight:600">¥${real.toLocaleString()}</td></tr>`;}).join('')}</tbody></table></div></div>`;
}

const WorkflowEngine = {
  key: 'portal_workflows',
  
  getAll() {
    try { return JSON.parse(localStorage.getItem(this.key)) || []; } catch { return []; }
  },
  
  save(list) { localStorage.setItem(this.key, JSON.stringify(list)); },
  
  getById(id) { return this.getAll().find(w => w.id === id); },
  
  advance(workflowId, nextStep, data = {}) {
    const list = this.getAll();
    const wf = list.find(w => w.id === workflowId);
    if (!wf) return;
    const stepDef = wf.steps.find(s => s.key === nextStep);
    if (stepDef) {
      stepDef.status = 'done';
      stepDef.doneAt = new Date().toLocaleString('zh-CN');
      stepDef.doneBy = '席宝';
      Object.assign(stepDef.data || {}, data);
    }
    // Find next pending step
    const currentIdx = wf.steps.findIndex(s => s.key === nextStep);
    if (currentIdx < wf.steps.length - 1) {
      wf.currentStep = wf.steps[currentIdx + 1].key;
    } else {
      wf.status = 'completed';
      wf.currentStep = null;
    }
    wf.updatedAt = new Date().toLocaleString('zh-CN');
    this.save(list);
  },
  
  reject(workflowId, currentStep, reason) {
    const list = this.getAll();
    const wf = list.find(w => w.id === workflowId);
    if (!wf) return;
    const step = wf.steps.find(s => s.key === currentStep);
    if (step) { step.status = 'rejected'; step.rejectReason = reason; }
    wf.status = 'rejected';
    wf.updatedAt = new Date().toLocaleString('zh-CN');
    this.save(list);
  },
  
  startWorkflow(type, title, data) {
    const list = this.getAll();
    const id = 'WF' + Date.now().toString(36).toUpperCase();
    let steps = [];
    
    if (type === 'procurement') {
      steps = [
        {key:'purchase_apply', label:'采购申请', system:'oa-system.html', status:'done', doneAt:new Date().toLocaleString('zh-CN'), doneBy:'席宝', data},
        {key:'purchase_approve', label:'采购审批', system:'oa-system.html', status:'pending'},
        {key:'contract_approve', label:'合同审批', system:'legal-system.html', status:'pending'},
        {key:'seal_apply', label:'用印申请', system:'oa-system.html', status:'pending'},
        {key:'seal_approve', label:'用印审批', system:'oa-system.html', status:'pending'},
        {key:'goods_receive', label:'到货验收', system:'inventory-system.html', status:'pending'},
        {key:'finance_pay', label:'财务付款', system:'finance-system.html', status:'pending'},
        {key:'voucher_entry', label:'凭证入账', system:'finance-system.html', status:'pending'},
      ];
    } else if (type === 'sales') {
      steps = [
        {key:'sales_contract', label:'销售合同', system:'production-system.html', status:'done', doneAt:new Date().toLocaleString('zh-CN'), doneBy:'席宝', data},
        {key:'outbound_apply', label:'出库申请', system:'inventory-system.html', status:'pending'},
        {key:'outbound_approve', label:'出库审核', system:'oa-system.html', status:'pending'},
        {key:'outbound_exec', label:'出库执行', system:'inventory-system.html', status:'pending'},
        {key:'customer_accept', label:'客户验收', system:'production-system.html', status:'pending'},
        {key:'receivable', label:'应收账款', system:'finance-system.html', status:'pending'},
        {key:'bank_confirm', label:'银行到账', system:'finance-system.html', status:'pending'},
      ];
    }
    
    const wf = {
      id, type, title, status: 'active',
      currentStep: steps.length > 1 ? steps[1].key : null,
      createdAt: new Date().toLocaleString('zh-CN'),
      updatedAt: new Date().toLocaleString('zh-CN'),
      steps
    };
    list.unshift(wf);
    this.save(list);
    return wf;
  },
  
  getPendingForSystem(systemFile) {
    return this.getAll().filter(wf => 
      wf.status === 'active' && wf.currentStep &&
      wf.steps.find(s => s.key === wf.currentStep && s.system === systemFile)
    );
  },
  
  renderProgress(wf, compact) {
    if (!wf) return '';
    const steps = wf.steps;
    return `<div style="display:flex;gap:4px;margin-bottom:16px">${steps.map((s, i) => {
      const isDone = s.status === 'done';
      const isCurrent = wf.currentStep === s.key;
      const isRejected = s.status === 'rejected';
      return `<div style="flex:1;text-align:center;padding:6px 4px;background:${isDone ? '#d1fae5' : isRejected ? '#fee2e2' : isCurrent ? '#dbeafe' : 'var(--gray-50)'};border-radius:6px;font-size:10px;border:${isCurrent ? '2px solid var(--primary)' : '1px solid transparent'}">
        <div style="font-size:12px">${isDone ? '✅' : isRejected ? '❌' : isCurrent ? '🔄' : '⏳'}</div>
        <div style="margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.label}</div>
      </div>`;
    }).join('')}</div>`;
  }
};
