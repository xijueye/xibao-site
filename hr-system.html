<style>
.pipeline{display:flex;gap:12px;padding:20px 0}
.pipe-stage{flex:1;background:var(--gray-50);border-radius:8px;padding:12px;text-align:center}
.pipe-stage .count{font-size:24px;font-weight:700;color:var(--primary)}
.pipe-stage .label{font-size:12px;color:var(--gray-500);margin-top:4px}
.pipe-card{background:white;border-radius:6px;padding:10px;margin-top:8px;text-align:left;font-size:13px;box-shadow:var(--shadow-sm);cursor:pointer}
.pipe-card:hover{box-shadow:var(--shadow-md)}
.pipe-card .name{font-weight:600;color:var(--gray-800)}
.pipe-card .info{color:var(--gray-400);font-size:11px;margin-top:2px}
.pipe-card .salary{color:var(--primary);font-weight:600;font-size:12px;margin-top:4px}
.train-card{background:white;border-radius:8px;padding:16px;box-shadow:var(--shadow-sm);display:flex;gap:16px;align-items:center}
.train-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.train-info{flex:1}
.train-info h4{font-size:14px;color:var(--gray-800)}
.train-info p{font-size:12px;color:var(--gray-400);margin-top:2px}
.train-meta{display:flex;gap:16px;margin-top:6px;font-size:12px;color:var(--gray-500)}
.eval-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--gray-100)}
.eval-row:last-child{border-bottom:none}
.eval-name{width:80px;font-weight:600;font-size:14px}
.eval-scores{flex:1;display:flex;gap:8px}
.eval-score{flex:1;text-align:center}
.eval-score .num{font-size:16px;font-weight:700}
.eval-score .label{font-size:11px;color:var(--gray-400)}
</style>
</head>

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
  event.target.closest('.menu-item')?.classList.add('active');
  document.getElementById('page-title').textContent=tabs[tab]||'';
  const addBtn=document.getElementById('add-btn');
  addBtn.style.display='';
  if(tab==='employee'){addBtn.textContent='➕ 新增员工';addBtn.onclick=showAddEmployee;}
  else if(tab==='recruit'){addBtn.textContent='➕ 发布招聘';addBtn.onclick=showNewRecruit;}
  else if(tab==='candidate'){addBtn.textContent='➕ 新增候选人';addBtn.onclick=showNewCandidate;}
  else if(tab==='training'){addBtn.textContent='➕ 新建培训';addBtn.onclick=showNewTraining;}
  else{addBtn.style.display='none';}
  renderContent();
}

}

// ===== 员工花名册 =====
function renderEmployee(el){
  const list=DB.get('hr_employees');
  el.innerHTML=`<div class="dashboard-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
    <div class="mini-stat"><div class="icon">👥</div><div class="num">${list.length}</div><div class="desc">在职总人数</div></div>
    <div class="mini-stat"><div class="icon">✅</div><div class="num">${list.filter(i=>i.status==='在职').length}</div><div class="desc">正式员工</div></div>
    <div class="mini-stat"><div class="icon">⏳</div><div class="num">${list.filter(i=>i.status==='试用期').length}</div><div class="desc">试用期</div></div>
    <div class="mini-stat"><div class="icon">💰</div><div class="num">¥${(Summary.calc(list,'salary')/10000).toFixed(1)}万</div><div class="desc">月薪总额</div></div>
  </div>
  <div class="card"><div class="filter-bar">
    <select id="f-dept"><option value="">全部部门</option>${depts.map(d=>`<option>${d}</option>`).join('')}</select>
    <select id="f-status"><option value="">全部状态</option><option>在职</option><option>试用期</option></select>
    <input type="text" id="f-kw" placeholder="搜索姓名/工号...">
    <button class="btn btn-primary" onclick="renderEmpList()">🔍 搜索</button>
  </div><div id="emp-list"></div></div>`;
  renderEmpList();
}
function renderEmpList(){
  let list=DB.get('hr_employees');
  const d=document.getElementById('f-dept')?.value,s=document.getElementById('f-status')?.value,k=document.getElementById('f-kw')?.value?.toLowerCase();
  if(d)list=list.filter(i=>i.dept===d);if(s)list=list.filter(i=>i.status===s);if(k)list=list.filter(i=>i.name.toLowerCase().includes(k)||i.id.toLowerCase().includes(k));
  document.getElementById('emp-list').innerHTML=`<table><thead><tr><th>工号</th><th>姓名</th><th>性别</th><th>部门</th><th>岗位</th><th>入职日期</th><th>学历</th><th>月薪</th><th>状态</th><th>操作</th></tr></thead>
  <tbody>${list.map(e=>`<tr><td>${e.id}</td><td><strong>${e.name}</strong></td><td>${e.gender}</td><td>${e.dept}</td><td>${e.position}</td><td>${e.joinDate}</td><td>${e.education}</td><td>¥${e.salary?.toLocaleString()}</td>
  <td><span class="status ${e.status==='在职'?'approved':'processing'}">${e.status}</span></td>
  <td><a href="#" onclick="viewEmployee('${e.id}');return false" style="color:var(--primary);font-size:13px;text-decoration:none">查看</a> <a href="#" onclick="editEmployee('${e.id}');return false" style="color:var(--gray-500);font-size:13px;text-decoration:none;margin-left:4px">编辑</a></td></tr>`).join('')}</tbody></table>
  <div style="padding:16px;text-align:center;color:var(--gray-400);font-size:13px">共 ${list.length} 条记录</div>`;
}
function showAddEmployee(){
  const fields=[{name:'id',label:'工号',required:true},{name:'name',label:'姓名',required:true},{name:'gender',label:'性别',type:'select',options:['男','女'],required:true},
  {name:'dept',label:'部门',type:'select',options:depts,required:true},{name:'position',label:'岗位',required:true},{name:'joinDate',label:'入职日期',type:'date',required:true},
  {name:'phone',label:'手机号',required:true},{name:'email',label:'邮箱',type:'email'},{name:'education',label:'学历',type:'select',options:['博士','硕士','本科','大专'],required:true},
  {name:'salary',label:'月薪（元）',type:'number',required:true},{name:'status',label:'状态',type:'select',options:['在职','试用期'],required:true}];
  const html=Form.render(fields)+`<div style="margin-top:16px;text-align:right"><button class="btn" style="background:#f3f4f6;color:#374151" onclick="Modal.close(this.closest('[id^=modal]').id)">取消</button><button class="btn btn-primary" onclick="saveEmployee()">提交</button></div>`;
  Modal.show('📝 新增员工',html,{width:'600px'});
}
function saveEmployee(){const d=Form.getData();if(!d.id||!d.name){Modal.toast('请填写必填项','warning');return;}d.salary=parseInt(d.salary)||0;const l=DB.get('hr_employees');if(l.find(i=>i.id===d.id)){Modal.toast('工号已存在','error');return;}l.unshift(d);DB.set('hr_employees',l);document.querySelectorAll('[id^=modal-]').forEach(m=>m.remove());Modal.toast(`✅ 员工 ${d.name} 入职成功`);renderContent();}
function viewEmployee(id){const e=DB.get('hr_employees').find(i=>i.id===id);if(!e)return;const html=`<div class="detail-grid" style="grid-template-columns:1fr 1fr">
  <div class="detail-item"><div class="label">工号</div><div class="value">${e.id}</div></div><div class="detail-item"><div class="label">姓名</div><div class="value">${e.name}</div></div>
  <div class="detail-item"><div class="label">性别</div><div class="value">${e.gender}</div></div><div class="detail-item"><div class="label">学历</div><div class="value">${e.education}</div></div>
  <div class="detail-item"><div class="label">部门</div><div class="value">${e.dept}</div></div><div class="detail-item"><div class="label">岗位</div><div class="value">${e.position}</div></div>
  <div class="detail-item"><div class="label">入职日期</div><div class="value">${e.joinDate}</div></div><div class="detail-item"><div class="label">手机</div><div class="value">${e.phone}</div></div>
  <div class="detail-item"><div class="label">邮箱</div><div class="value">${e.email||'-'}</div></div><div class="detail-item"><div class="label">状态</div><div class="value"><span class="status ${e.status==='在职'?'approved':'processing'}">${e.status}</span></div></div>
  <div class="detail-item" style="grid-column:1/-1"><div class="label">月薪</div><div class="value" style="color:var(--primary);font-size:20px;font-weight:700">¥${e.salary?.toLocaleString()}</div></div></div>`;
  Modal.show(`👤 员工详情 - ${e.name}`,html,{width:'520px'});
}
