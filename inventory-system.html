let currentTab = 'inbound';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
  event.target.closest('.menu-item')?.classList.add('active');
  const addBtn = document.getElementById('add-btn');
  if (tab === 'inbound') { addBtn.textContent = '➕ 新建入库单'; addBtn.onclick = showNewInbound; }
  else if (tab === 'outbound') { addBtn.textContent = '➕ 新建出库单'; addBtn.onclick = showNewOutbound; }
  else { addBtn.style.display = 'none'; }
  renderContent();
}

function renderContent() {
  const el = document.getElementById('tab-content');
  document.getElementById('add-btn').style.display = '';
  const titles = {inbound:'📥 入库登记',outbound:'📤 出库登记',stock:'📊 库存总览',warning:'⚠️ 库存预警'};
  document.getElementById('page-title').textContent = titles[currentTab] || '';
  ({inbound:renderInbound, outbound:renderOutbound, stock:renderStock, warning:renderWarning})[currentTab]?.(el);
}

// ===== 入库管理 =====

// ===== 流程中心 - 到货验收/出库 =====
function renderWorkflowGoods(el) {
  const receivePending = WorkflowEngine.getPendingForSystem('inventory-system.html');
  if (!receivePending.length) return '';
  return `<div class="card" style="margin-bottom:20px;border-left:4px solid #059669"><div class="card-header"><h3>🔄 跨系统流程 - 待处理</h3></div><div class="card-body">
    <table><thead><tr><th>流程</th><th>当前步骤</th><th>操作</th></tr></thead>
    <tbody>${receivePending.map(wf => {
      const step = wf.steps.find(s => s.key === wf.currentStep);
      return `<tr><td><strong>${wf.title}</strong><div style="font-size:11px;color:var(--gray-400)">${wf.id}</div></td>
        <td><span class="status processing">${step?.label||wf.currentStep}</span></td>
        <td><button class="btn btn-sm btn-success" onclick="advanceWfFromInv('${wf.id}','${wf.currentStep}')">确认完成</button></td></tr>`;
    }).join('')}</tbody></table>
  </div></div>`;
}
function advanceWfFromInv(wfId, stepKey) {
  WorkflowEngine.advance(wfId, stepKey);
  Modal.toast('✅ 已确认，流程推进到下一步'); renderContent();
}

function renderInbound(el) {
  const wfHtml = renderWorkflowGoods(el);
  const list = DB.get('inv_inbounds');
  el.innerHTML = `
    ${wfHtml||''}
    <div class="portal-stats" style="margin-bottom:20px">
      <div class="stat-card"><div class="label">待入库</div><div class="value">${list.filter(i=>i.status!=='已入库').length}</div></div>
      <div class="stat-card green"><div class="label">本月已入库</div><div class="value">${list.filter(i=>i.status==='已入库').length}单</div></div>
      <div class="stat-card orange"><div class="label">本月入库金额（万元）</div><div class="value">${(Summary.calc(list.filter(i=>i.status==='已入库'),'qty')*1000/10000).toFixed(1)}</div></div>
    </div>
    <div class="card"><div class="card-body">
      <table><thead><tr><th>入库单号</th><th>物料名称</th><th>规格</th><th>供应商</th><th>数量</th><th>单价</th><th>仓库</th><th>日期</th><th>状态</th><th>操作</th></tr></thead>
      <tbody>${list.map(i=>`<tr>
        <td style="font-size:12px">${i.id}</td><td><strong>${i.item}</strong></td><td style="font-size:12px">${i.spec}</td><td>${i.supplier}</td>
        <td>${i.qty}${i.unit||'件'}</td><td>¥${i.unitPrice?.toLocaleString()||'-'}</td><td>${i.warehouse}</td><td>${i.date}</td>
        <td><span class="status ${i.status==='已入库'?'approved':i.status==='待验收'?'pending':'processing'}">${i.status}</span></td>
        <td>${i.status==='待验收' ? `<button class="btn btn-sm btn-success" onclick="confirmReceive('${i.id}')">验收入库</button>` :
          i.status==='已入库' ? `<a href="#" onclick="viewInbound('${i.id}');return false" style="color:var(--primary);font-size:13px;text-decoration:none">查看</a>` :
          `<span style="color:var(--gray-400);font-size:12px">运输中</span>`}</td>
      </tr>`).join('')}</tbody></table>
    </div></div>`;
}

function showNewInbound() {
  const fields = [
    {name:'item',label:'物料名称',required:true},
    {name:'spec',label:'规格型号',required:true},
    {name:'supplier',label:'供应商',type:'select',options:suppliers,required:true},
    {name:'qty',label:'数量',type:'number',required:true},
    {name:'unitPrice',label:'单价（元）',type:'number',required:true},
    {name:'warehouse',label:'入库仓库',type:'select',options:warehouses,required:true},
    {name:'date',label:'预计到货日期',type:'date',required:true},
  ];
  const html = Form.render(fields) + `<div style="margin-top:20px;text-align:right">
    <button class="btn" style="background:#f3f4f6;color:#374151" onclick="Modal.close(this.closest('[id^=modal]').id)">取消</button>
    <button class="btn btn-primary" onclick="saveInbound()">提交入库单</button></div>`;
  Modal.show('📥 新建入库单', html, {width:'560px'});
}

function saveInbound() {
  const data = Form.getData();
  if (!data.item || !data.supplier) { Modal.toast('请填写必填项', 'warning'); return; }
  const list = DB.get('inv_inbounds');
  list.unshift({...data, id:DB.genId('RK'), qty:parseInt(data.qty), unitPrice:parseFloat(data.unitPrice), status:'待验收'});
  DB.set('inv_inbounds', list);
  document.querySelectorAll('[id^=modal-]').forEach(m=>m.remove());
  Modal.toast('✅ 入库单已创建'); renderContent();
}

function confirmReceive(id) {
  Modal.confirm('确认验收此批物料入库？', () => {
    const list = DB.get('inv_inbounds');
    const item = list.find(i=>i.id===id);
    if (item) {
      item.status = '已入库'; item.receivedBy = '席宝';
      DB.set('inv_inbounds', list);
      // 更新库存
      const stock = DB.get('inv_stock');
      const existing = stock.find(s => s.name.includes(item.item.split(' ')[0]));
      if (existing) { existing.qty += item.qty; }
      else { stock.push({code:DB.genId('WH'),name:item.item,spec:item.spec,warehouse:item.warehouse,qty:item.qty,safety:10,unit:'件',cost:item.unitPrice}); }
      DB.set('inv_stock', stock);
      Modal.toast('✅ 验收完成，库存已更新'); renderContent();
    }
  });
}

function viewInbound(id) {
  const i = DB.get('inv_inbounds').find(x=>x.id===id);
  if (!i) return;
  const html = `<div class="detail-grid" style="grid-template-columns:1fr 1fr">
    <div class="detail-item"><div class="label">入库单号</div><div class="value">${i.id}</div></div>
    <div class="detail-item"><div class="label">物料名称</div><div class="value">${i.item}</div></div>
    <div class="detail-item"><div class="label">规格型号</div><div class="value">${i.spec}</div></div>
    <div class="detail-item"><div class="label">供应商</div><div class="value">${i.supplier}</div></div>
    <div class="detail-item"><div class="label">数量</div><div class="value">${i.qty}件</div></div>
    <div class="detail-item"><div class="label">单价</div><div class="value">¥${i.unitPrice?.toLocaleString()}</div></div>
    <div class="detail-item"><div class="label">金额</div><div class="value" style="color:var(--primary);font-weight:700">¥${(i.qty*i.unitPrice).toLocaleString()}</div></div>
    <div class="detail-item"><div class="label">验收人</div><div class="value">${i.receivedBy||'-'}</div></div>
  </div>`;
  Modal.show(`入库单详情 - ${i.id}`, html, {width:'520px'});
}

function showNewOutbound() {
  const stock = DB.get('inv_stock');
  const fields = [
    {name:'item',label:'物料名称',type:'select',options:stock.map(s=>`${s.name}（库存:${s.qty}${s.unit}）`),required:true},
    {name:'qty',label:'数量',type:'number',required:true},
    {name:'dept',label:'领用部门',type:'select',options:['技术研发部','市场营销部','生产制造部','财务管理部','人力资源部','行政综合部','项目交付部','法务合规部'],required:true},
    {name:'applicant',label:'领用人',required:true},
    {name:'purpose',label:'用途',type:'textarea',full:true,required:true},
  ];
  const html = Form.render(fields) + `<div style="margin-top:20px;text-align:right">
    <button class="btn" style="background:#f3f4f6;color:#374151" onclick="Modal.close(this.closest('[id^=modal]').id)">取消</button>
    <button class="btn btn-primary" onclick="saveOutbound()">提交出库</button></div>`;
  Modal.show('📤 新建出库单', html, {width:'560px'});
}

function saveOutbound() {
  const data = Form.getData();
  if (!data.item || !data.qty) { Modal.toast('请填写必填项', 'warning'); return; }
  const itemName = data.item.split('（')[0];
  const stock = DB.get('inv_stock');
  const s = stock.find(i => i.name === itemName);
  if (s && parseInt(data.qty) > s.qty) { Modal.toast(`库存不足！当前库存仅 ${s.qty}${s.unit}`, 'error'); return; }

  const list = DB.get('inv_outbounds');
  list.unshift({...data, id:DB.genId('CK'), qty:parseInt(data.qty), date:new Date().toISOString().slice(0,10), status:'已出库'});
  DB.set('inv_outbounds', list);
  if (s) { s.qty -= parseInt(data.qty); DB.set('inv_stock', stock); }
  document.querySelectorAll('[id^=modal-]').forEach(m=>m.remove());
  Modal.toast('✅ 出库成功，库存已更新'); renderContent();
}

function renderStock(el) {
  const stock = DB.get('inv_stock');
  const totalValue = stock.reduce((s,i) => s + i.qty * i.cost, 0);
  el.innerHTML = `
    ${wfHtml||''}
    <div class="portal-stats" style="margin-bottom:20px">
      <div class="stat-card"><div class="label">SKU数量</div><div class="value">${stock.length}</div></div>
      <div class="stat-card green"><div class="label">库存总值（万元）</div><div class="value">${(totalValue/10000).toFixed(1)}</div></div>

function renderStockList() {

  document.getElementById('stock-list').innerHTML = `<table><thead><tr><th>物料编码</th><th>物料名称</th><th>规格</th><th>仓库</th><th>库存量</th><th>安全库存</th><th>单价</th><th>库存金额</th><th>状态</th></tr></thead>

      const warn = s.qty < s.safety;
      return `<tr><td>${s.code}</td><td><strong>${s.name}</strong></td><td style="font-size:12px">${s.spec}</td><td>${s.warehouse}</td>

}

// ===== 库存预警 =====
function renderWarning(el) {
  const stock = DB.get('inv_stock');
  const warnings = stock.filter(i=>i.qty<i.safety).sort((a,b)=>(a.qty/a.safety)-(b.qty/b.safety));
  el.innerHTML = `
    ${wfHtml||''}
    <div class="portal-stats" style="margin-bottom:20px">
      <div class="stat-card red"><div class="label">预警物料数</div><div class="value">${warnings.length}</div></div>
      <div class="stat-card orange"><div class="label">需采购总金额（万元）</div><div class="value">${(warnings.reduce((s,w)=>s+(w.safety-w.qty)*w.cost,0)/10000).toFixed(1)}</div></div>
    </div>
    <div class="card"><div class="card-header"><h3>⚠️ 低于安全库存的物料</h3></div>
      <div class="card-body">${warnings.length ? `<table><thead><tr><th>编码</th><th>名称</th><th>当前库存</th><th>安全库存</th><th>缺口</th><th>仓库</th><th>建议采购金额</th><th>操作</th></tr></thead>
        <tbody>${warnings.map(w => {
          const gap = w.safety - w.qty;
          return `<tr><td>${w.code}</td><td><strong>${w.name}</strong></td>
          <td style="color:var(--danger);font-weight:700">${w.qty} ${w.unit}</td>
          <td>${w.safety} ${w.unit}</td>
          <td style="color:var(--danger)">${gap} ${w.unit}</td>
          <td>${w.warehouse}</td>
          <td style="font-weight:600">¥${(gap*w.cost).toLocaleString()}</td>
          <td><button class="btn btn-sm btn-warning" onclick="createPurchase('${w.name}',${gap},${w.cost})">生成采购单</button></td></tr>`;
        }).join('')}</tbody></table>`
        : '<div style="padding:40px;text-align:center;color:var(--gray-400)"><div style="font-size:48px;margin-bottom:8px">✅</div>所有物料库存充足</div>'}

}

function createPurchase(name, qty, price) {

// ===== 跨系统流程引擎 =====
const WorkflowEngine = {
  key: 'portal_workflows',
  
  getAll() {
    try { return JSON.parse(localStorage.getItem(this.key)) || []; } catch { return []; }
  },
  
  save(list) { localStorage.setItem(this.key, JSON.stringify(list)); },
  
  getById(id) { return this.getAll().find(w => w.id === id); },
  
  advance(workflowId, nextStep, data = {}) {
    const list = this.getAll();
    const wf = list.find(w => w.id === workflowId);
    if (!wf) return;
    const stepDef = wf.steps.find(s => s.key === nextStep);
    if (stepDef) {
      stepDef.status = 'done';
      stepDef.doneAt = new Date().toLocaleString('zh-CN');
      stepDef.doneBy = '席宝';
      Object.assign(stepDef.data || {}, data);
    }
    // Find next pending step
    const currentIdx = wf.steps.findIndex(s => s.key === nextStep);
    if (currentIdx < wf.steps.length - 1) {
      wf.currentStep = wf.steps[currentIdx + 1].key;
    } else {
      wf.status = 'completed';
      wf.currentStep = null;
    }
    wf.updatedAt = new Date().toLocaleString('zh-CN');
    this.save(list);
  },
  
  reject(workflowId, currentStep, reason) {
    const list = this.getAll();
    const wf = list.find(w => w.id === workflowId);
    if (!wf) return;
    const step = wf.steps.find(s => s.key === currentStep);
    if (step) { step.status = 'rejected'; step.rejectReason = reason; }
    wf.status = 'rejected';
    wf.updatedAt = new Date().toLocaleString('zh-CN');
    this.save(list);
  },
  
  startWorkflow(type, title, data) {
    const list = this.getAll();
    const id = 'WF' + Date.now().toString(36).toUpperCase();
    let steps = [];
    
    if (type === 'procurement') {
      steps = [
        {key:'purchase_apply', label:'采购申请', system:'oa-system.html', status:'done', doneAt:new Date().toLocaleString('zh-CN'), doneBy:'席宝', data},
        {key:'purchase_approve', label:'采购审批', system:'oa-system.html', status:'pending'},
        {key:'contract_approve', label:'合同审批', system:'legal-system.html', status:'pending'},
        {key:'seal_apply', label:'用印申请', system:'oa-system.html', status:'pending'},
        {key:'seal_approve', label:'用印审批', system:'oa-system.html', status:'pending'},
        {key:'goods_receive', label:'到货验收', system:'inventory-system.html', status:'pending'},
        {key:'finance_pay', label:'财务付款', system:'finance-system.html', status:'pending'},
        {key:'voucher_entry', label:'凭证入账', system:'finance-system.html', status:'pending'},
      ];
    } else if (type === 'sales') {
      steps = [
        {key:'sales_contract', label:'销售合同', system:'production-system.html', status:'done', doneAt:new Date().toLocaleString('zh-CN'), doneBy:'席宝', data},
        {key:'outbound_apply', label:'出库申请', system:'inventory-system.html', status:'pending'},
        {key:'outbound_approve', label:'出库审核', system:'oa-system.html', status:'pending'},
        {key:'outbound_exec', label:'出库执行', system:'inventory-system.html', status:'pending'},
        {key:'customer_accept', label:'客户验收', system:'production-system.html', status:'pending'},
        {key:'receivable', label:'应收账款', system:'finance-system.html', status:'pending'},
        {key:'bank_confirm', label:'银行到账', system:'finance-system.html', status:'pending'},
      ];
    }
    
    const wf = {
      id, type, title, status: 'active',
      currentStep: steps.length > 1 ? steps[1].key : null,
      createdAt: new Date().toLocaleString('zh-CN'),
      updatedAt: new Date().toLocaleString('zh-CN'),
      steps
    };
    list.unshift(wf);
    this.save(list);
    return wf;
  },
  
  getPendingForSystem(systemFile) {
    return this.getAll().filter(wf => 
      wf.status === 'active' && wf.currentStep &&
      wf.steps.find(s => s.key === wf.currentStep && s.system === systemFile)
    );
  },
  
  renderProgress(wf, compact) {
    if (!wf) return '';
    const steps = wf.steps;
    return `<div style="display:flex;gap:4px;margin-bottom:16px">${steps.map((s, i) => {
      const isDone = s.status === 'done';
      const isCurrent = wf.currentStep === s.key;
      const isRejected = s.status === 'rejected';
      return `<div style="flex:1;text-align:center;padding:6px 4px;background:${isDone ? '#d1fae5' : isRejected ? '#fee2e2' : isCurrent ? '#dbeafe' : 'var(--gray-50)'};border-radius:6px;font-size:10px;border:${isCurrent ? '2px solid var(--primary)' : '1px solid transparent'}">
        <div style="font-size:12px">${isDone ? '✅' : isRejected ? '❌' : isCurrent ? '🔄' : '⏳'}</div>
        <div style="margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.label}</div>
      </div>`;
    }).join('')}</div>`;
  }
};
