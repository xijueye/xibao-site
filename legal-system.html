let currentTab = 'contract';
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
  event.target.closest('.menu-item')?.classList.add('active');
  const addBtn = document.getElementById('add-btn');
  addBtn.style.display = '';
  if (tab === 'contract') { addBtn.textContent = '➕ 提交合同审核'; addBtn.onclick = showNewContract; }
  else if (tab === 'case') { addBtn.textContent = '➕ 登记案件'; addBtn.onclick = showNewCase; }
  else { addBtn.style.display = 'none'; }
  renderContent();
}

function renderContent() {
  const el = document.getElementById('tab-content');
  const titles = {contract:'📄 合同审核',case:'⚖️ 诉讼案件',compliance:'🛡️ 合规检查'};
  document.getElementById('page-title').textContent = titles[currentTab] || '';
  ({contract:renderContract, case:renderCase, compliance:renderCompliance})[currentTab]?.(el);
}

function renderContract(el) {
  const list = DB.get('leg_contracts');
  const kw=(document.getElementById('leg-ct-kw')?.value||'').toLowerCase();
  const filtered=kw?list.filter(c=>c.name.toLowerCase().includes(kw)||c.counterparty.toLowerCase().includes(kw)||c.id.toLowerCase().includes(kw)):list;
  el.innerHTML = `
    <div class="portal-stats" style="margin-bottom:20px">
      <div class="stat-card"><div class="label">待审核</div><div class="value">${list.filter(i=>i.status==='待审核').length}</div></div>
      <div class="stat-card green"><div class="label">已审核</div><div class="value">${list.filter(i=>i.status!=='待审核').length}</div></div>
      <div class="stat-card orange"><div class="label">紧急</div><div class="value">${list.filter(i=>i.priority==='紧急'&&i.status==='待审核').length}</div></div>
    </div>
    <div class="filter-bar"><input type="text" id="leg-ct-kw" placeholder="搜索合同名称/对方单位..." oninput="renderContract(document.getElementById('tab-content'))" style="padding:6px 12px;border:1px solid var(--gray-200);border-radius:6px;font-size:13px;width:240px"></div>
    <div class="card"><div class="card-body">
      <table><thead><tr><th>合同编号</th><th>合同名称</th><th>对方单位</th><th>金额（万）</th><th>提交人</th><th>日期</th><th>优先级</th><th>状态</th><th>操作</th></tr></thead>
      <tbody>${filtered.map(c=>`<tr>
        <td>${c.id}</td><td><strong>${c.name}</strong></td><td>${c.counterparty}</td><td>¥${c.amount}</td>
        <td>${c.applicant}</td><td>${c.date}</td>
        <td><span class="status ${c.priority==='紧急'?'danger':'pending'}">${c.priority}</span></td>
        <td><span class="status ${c.status==='待审核'?'pending':'approved'}">${c.status}</span></td>
        <td>${c.status==='待审核' ? `<button class="btn btn-sm btn-primary" onclick="approveContract('${c.id}')">通过</button> <button class="btn btn-sm btn-danger" onclick="rejectContract('${c.id}')" style="margin-left:2px">驳回</button>` : `<span style="color:var(--gray-400);font-size:12px">已处理</span>`}</td>

function showNewContract() {
  const fields = [
    {name:'name',label:'合同名称',full:true,required:true},
    {name:'counterparty',label:'对方单位',required:true},
    {name:'amount',label:'合同金额（万元）',type:'number',required:true},
    {name:'applicant',label:'提交人',required:true},
    {name:'priority',label:'优先级',type:'select',options:['紧急','普通'],required:true},
    {name:'summary',label:'合同摘要',type:'textarea',full:true,required:true},
  ];
  const html = Form.render(fields) + `<div style="margin-top:20px;text-align:right">
    <button class="btn" style="background:#f3f4f6;color:#374151" onclick="Modal.close(this.closest('[id^=modal]').id)">取消</button>
    <button class="btn btn-primary" onclick="saveContract()">提交审核</button></div>`;
  Modal.show('➕ 提交合同审核', html, {width:'560px'});
}

function saveContract() {
  const data = Form.getData();
  if (!data.name || !data.counterparty) { Modal.toast('请填写必填项', 'warning'); return; }
  const list = DB.get('leg_contracts');
  list.unshift({...data, id:DB.genId('HTFW'), amount:parseFloat(data.amount), date:new Date().toISOString().slice(0,10), status:'待审核'});
  DB.set('leg_contracts', list);
  document.querySelectorAll('[id^=modal-]').forEach(m=>m.remove());
  Modal.toast(`✅ 合同「${data.name}」已提交审核`); renderContent();
}

function approveContract(id) {
  const list = DB.get('leg_contracts');
  const item = list.find(i=>i.id===id);
  if (item) { item.status = '已通过'; item.approvedBy = '席宝'; DB.set('leg_contracts', list); Modal.toast('✅ 法务审核通过'); renderContent(); }
}

function rejectContract(id) {
  const html = `<div><label style="display:block;font-size:13px;color:#4b5563;margin-bottom:6px;font-weight:500">审核意见</label>
    <textarea id="leg-reject-reason" rows="3" style="width:100%;padding:8px 12px;border:1px solid #d1d5db;border-radius:6px" placeholder="请填写法务审核意见..."></textarea></div>`;
  Modal.show('法务审核意见', html, {width:'420px', footer:`<button class="btn" style="background:#f3f4f6;color:#374151" onclick="Modal.close(this.closest('[id^=modal]').id)">取消</button><button class="btn btn-danger" onclick="confirmRejectContract('${id}')">驳回</button>`});
}

function confirmRejectContract(id) {
  const reason = document.getElementById('leg-reject-reason')?.value;
  const list = DB.get('leg_contracts');
  const item = list.find(i=>i.id===id);
  if (item) { item.status = '已驳回'; item.reason = reason || '不符合规范'; DB.set('leg_contracts', list); document.querySelectorAll('[id^=modal-]').forEach(m=>m.remove()); Modal.toast('❌ 已驳回', 'error'); renderContent(); }
}

function viewCase(id) {
  const c = DB.get('leg_cases').find(i=>i.id===id);
  if (!c) return;
  const html = `<div class="detail-grid" style="grid-template-columns:1fr 1fr">
    <div class="detail-item"><div class="label">案件编号</div><div class="value">${c.id}</div></div>
    <div class="detail-item"><div class="label">对方当事人</div><div class="value">${c.counterparty}</div></div>
    <div class="detail-item"><div class="label">案由</div><div class="value">${c.cause}</div></div>
    <div class="detail-item"><div class="label">涉案金额</div><div class="value" style="color:var(--primary);font-weight:700">¥${c.amount}万</div></div>
    <div class="detail-item"><div class="label">当前阶段</div><div class="value"><span class="status processing">${c.status}</span></div></div>
    <div class="detail-item"><div class="label">下次开庭</div><div class="value">${c.nextHearing}</div></div>

// ===== 合规检查 =====
// ===== 合规检查详情 =====
function viewComplianceDetail(name, items, passed){
  const failed=items-passed;
  const details={
    '数据安全合规':{items:['数据分类分级管理 ✅','数据加密传输 ✅','数据备份恢复 ✅','访问权限控制 ✅','数据安全审计 ✅','个人信息保护 ✅','数据泄露应急预案 ✅','数据库安全防护 ✅','日志监控与告警 ✅','数据脱敏处理 ✅','安全培训完成率 ✅','第三方数据共享合规 ✅']},
    '反腐败合规':{items:['反腐败制度建设 ✅','礼品礼金登记 ✅','利益冲突申报 ✅','供应商准入审查 ✅','采购招标合规 ✅','合同审批流程 ✅','费用报销规范 ✅','员工廉洁承诺 ⚠️ 1人未签']},
    '环保合规':{items:['环保许可证 ✅','污染物排放达标 ✅','废物处理合规 ✅','环保应急预案 ✅','环境监测报告 ✅','碳排放报告 ✅']},
    '劳动法合规':{items:['劳动合同签订率 ✅','社保公积金缴纳 ✅','工时管理合规 ✅','加班费支付 ✅','带薪年假执行 ✅','女职工保护 ✅','劳动安全卫生 ✅','职业病防治 ✅','员工培训记录 ✅','离职手续合规 ⚠️ 需完善']},
    '知识产权合规':{items:['专利申请管理 ✅','商标注册维护 ✅','软件著作权 ✅','技术秘密保护 ✅','知识产权培训 ✅']}
  };
  const detail=details[name];
  const html=`<div>
    <div style="display:flex;justify-content:space-between;margin-bottom:16px">
      <div><strong>检查项：</strong>${items}项 | <strong>通过：</strong>${passed}项</div>
      <div><strong>通过率：</strong><span style="color:${failed>0?'var(--warning)':'var(--success)'};font-weight:700">${(passed/items*100).toFixed(0)}%</span></div>
    </div>
    ${detail?`<div style="font-size:13px">${detail.items.map(it=>`<div style="padding:6px 0;border-bottom:1px solid var(--gray-100)">${it}</div>`).join('')}</div>`:
    `<div style="padding:12px;background:#d1fae5;border-radius:8px;font-size:13px;color:#065f46">✅ 全部${passed}项检查均已通过</div>`}
  </div>`;
  Modal.show(`🛡️ ${name} - 检查明细`,html,{width:'520px'});
}

function renderCompliance(el) {
  const checks = [
    {name:'数据安全合规',items:12,passed:12},
    {name:'反腐败合规',items:8,passed:7},
    {name:'环保合规',items:6,passed:6},
    {name:'劳动法合规',items:10,passed:9},
    {name:'知识产权合规',items:5,passed:5},
  ];
  el.innerHTML = `
    <div class="portal-stats" style="margin-bottom:20px">
      <div class="stat-card green"><div class="label">已通过</div><div class="value">${checks.filter(c=>c.passed===c.items).length}</div></div>
      <div class="stat-card orange"><div class="label">待整改</div><div class="value">${checks.filter(c=>c.passed<c.items).length}</div></div>
    </div>
    <div class="card"><div class="card-header"><h3>🛡️ 合规检查清单</h3></div><div class="card-body padded">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
        ${checks.map(c => {
          const rate = (c.passed/c.items*100).toFixed(0);
          const ok = c.passed === c.items;
          return `<div style="padding:16px;border:1px solid var(--gray-200);border-radius:8px;border-top:3px solid ${ok?'var(--success)':'var(--warning)'};cursor:pointer" onclick="viewComplianceDetail('${c.name}',${c.items},${c.passed})">
            <div style="font-weight:600;margin-bottom:8px">${c.name}</div>
            <div style="font-size:13px;color:var(--gray-500);margin-bottom:8px">检查项 ${c.items} 项</div>
            <div class="progress-bar"><div class="fill ${ok?'green':'orange'}" style="width:${rate}%"></div></div>
            <div style="font-size:12px;color:${ok?'var(--success)':'var(--warning)'};margin-top:6px">${ok?'✅ 全部通过':`⚠️ ${c.items-c.passed}项待整改`}</div>
          </div>`;
        }).join('')}
      </div>
    </div></div>`;
}

renderContent();

const WorkflowEngine = {
  key: 'portal_workflows',
  
  getAll() {
    try { return JSON.parse(localStorage.getItem(this.key)) || []; } catch { return []; }
  },
  
  save(list) { localStorage.setItem(this.key, JSON.stringify(list)); },
  
  getById(id) { return this.getAll().find(w => w.id === id); },
  
  advance(workflowId, nextStep, data = {}) {
    const list = this.getAll();
    const wf = list.find(w => w.id === workflowId);
    if (!wf) return;
    const stepDef = wf.steps.find(s => s.key === nextStep);
    if (stepDef) {
      stepDef.status = 'done';
      stepDef.doneAt = new Date().toLocaleString('zh-CN');
      stepDef.doneBy = '席宝';
      Object.assign(stepDef.data || {}, data);
    }
    // Find next pending step
    const currentIdx = wf.steps.findIndex(s => s.key === nextStep);
    if (currentIdx < wf.steps.length - 1) {
      wf.currentStep = wf.steps[currentIdx + 1].key;
    } else {
      wf.status = 'completed';
      wf.currentStep = null;
    }
    wf.updatedAt = new Date().toLocaleString('zh-CN');
    this.save(list);
  },
  
  reject(workflowId, currentStep, reason) {
    const list = this.getAll();
    const wf = list.find(w => w.id === workflowId);
    if (!wf) return;
    const step = wf.steps.find(s => s.key === currentStep);
    if (step) { step.status = 'rejected'; step.rejectReason = reason; }
    wf.status = 'rejected';
    wf.updatedAt = new Date().toLocaleString('zh-CN');
    this.save(list);
  },
  
  startWorkflow(type, title, data) {
    const list = this.getAll();
    const id = 'WF' + Date.now().toString(36).toUpperCase();
    let steps = [];
    
    if (type === 'procurement') {
      steps = [
        {key:'purchase_apply', label:'采购申请', system:'oa-system.html', status:'done', doneAt:new Date().toLocaleString('zh-CN'), doneBy:'席宝', data},
        {key:'purchase_approve', label:'采购审批', system:'oa-system.html', status:'pending'},
        {key:'contract_approve', label:'合同审批', system:'legal-system.html', status:'pending'},
        {key:'seal_apply', label:'用印申请', system:'oa-system.html', status:'pending'},
        {key:'seal_approve', label:'用印审批', system:'oa-system.html', status:'pending'},
        {key:'goods_receive', label:'到货验收', system:'inventory-system.html', status:'pending'},
        {key:'finance_pay', label:'财务付款', system:'finance-system.html', status:'pending'},
        {key:'voucher_entry', label:'凭证入账', system:'finance-system.html', status:'pending'},
      ];
    } else if (type === 'sales') {
      steps = [
        {key:'sales_contract', label:'销售合同', system:'production-system.html', status:'done', doneAt:new Date().toLocaleString('zh-CN'), doneBy:'席宝', data},
        {key:'outbound_apply', label:'出库申请', system:'inventory-system.html', status:'pending'},
        {key:'outbound_approve', label:'出库审核', system:'oa-system.html', status:'pending'},
        {key:'outbound_exec', label:'出库执行', system:'inventory-system.html', status:'pending'},
        {key:'customer_accept', label:'客户验收', system:'production-system.html', status:'pending'},
        {key:'receivable', label:'应收账款', system:'finance-system.html', status:'pending'},
        {key:'bank_confirm', label:'银行到账', system:'finance-system.html', status:'pending'},
      ];
    }
    
    const wf = {
      id, type, title, status: 'active',
      currentStep: steps.length > 1 ? steps[1].key : null,
      createdAt: new Date().toLocaleString('zh-CN'),
      updatedAt: new Date().toLocaleString('zh-CN'),
      steps
    };
    list.unshift(wf);
    this.save(list);
    return wf;
  },
  
  getPendingForSystem(systemFile) {
    return this.getAll().filter(wf => 
      wf.status === 'active' && wf.currentStep &&
      wf.steps.find(s => s.key === wf.currentStep && s.system === systemFile)
    );
  },
  
  renderProgress(wf, compact) {
    if (!wf) return '';
    const steps = wf.steps;
    return `<div style="display:flex;gap:4px;margin-bottom:16px">${steps.map((s, i) => {
      const isDone = s.status === 'done';
      const isCurrent = wf.currentStep === s.key;
      const isRejected = s.status === 'rejected';
      return `<div style="flex:1;text-align:center;padding:6px 4px;background:${isDone ? '#d1fae5' : isRejected ? '#fee2e2' : isCurrent ? '#dbeafe' : 'var(--gray-50)'};border-radius:6px;font-size:10px;border:${isCurrent ? '2px solid var(--primary)' : '1px solid transparent'}">
        <div style="font-size:12px">${isDone ? '✅' : isRejected ? '❌' : isCurrent ? '🔄' : '⏳'}</div>
        <div style="margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.label}</div>
      </div>`;
    }).join('')}</div>`;
  }
};
