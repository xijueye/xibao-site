let currentTab = 'project';
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));

  if (tab === 'project') { addBtn.textContent = '➕ 新建审计项目'; addBtn.onclick = showNewAudit; }
  else { addBtn.textContent = '➕ 录入问题'; addBtn.onclick = showNewIssue; }
  renderContent();
}

// ===== 审计项目详情 =====
function viewAuditProject(id){
  const p=DB.get('aud_projects').find(i=>i.id===id);if(!p)return;
  const relatedIssues=DB.get('aud_issues').filter(i=>i.source.includes(p.name.split(' ')[0]));
  const html=`<div style="font-size:14px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div><strong>项目编号：</strong>${p.id}</div><div><strong>审计类型：</strong>${p.type}</div>
      <div style="grid-column:1/-1"><strong>项目名称：</strong>${p.name}</div>
      <div><strong>审计组长：</strong>${p.leader}</div><div><strong>计划周期：</strong>${p.period}</div>
      <div><strong>进度：</strong><span style="font-weight:700;color:var(--primary)">${p.progress}%</span></div>
      <div><strong>状态：</strong><span class="status ${p.status==='已完成'?'approved':'processing'}">${p.status}</span></div>
    </div>
    <div class="progress-bar" style="margin-bottom:16px"><div class="fill ${p.progress>=80?'green':'blue'}" style="width:${p.progress}%"></div></div>
    ${relatedIssues.length?`<h4 style="font-size:13px;margin-bottom:8px">关联审计问题（${relatedIssues.length}项）</h4>
    <table><thead><tr><th>问题描述</th><th>风险等级</th><th>责任部门</th><th>状态</th></tr></thead>
    <tbody>${relatedIssues.map(i=>`<tr><td style="font-size:12px">${i.desc}</td><td><span class="status ${i.risk==='高'?'danger':i.risk==='中'?'warning':'pending'}">${i.risk}</span></td><td>${i.dept}</td><td><span class="status ${i.status==='已整改'?'approved':i.status==='整改中'?'warning':'pending'}">${i.status}</span></td></tr>`).join('')}</tbody></table>`:'<div style="padding:12px;text-align:center;color:var(--gray-400);font-size:13px">暂无关联问题</div>'}</div>`;
  Modal.show(`🔍 审计项目详情 - ${p.name}`,html,{width:'600px'});
}

      <div style="grid-column:1/-1"><strong>问题描述：</strong>${issue.desc}</div>
      <div><strong>风险等级：</strong><span class="status ${issue.risk==='高'?'danger':issue.risk==='中'?'warning':'pending'}">${issue.risk}</span></div>

function saveAudit() {
  const data = Form.getData();
  if (!data.name || !data.leader) { Modal.toast('请填写必填项', 'warning'); return; }
  const list = DB.get('aud_projects');
  list.unshift({...data, id:DB.genId('AUD'), progress:0, status:'计划中'});
  DB.set('aud_projects', list);
  document.querySelectorAll('[id^=modal-]').forEach(m=>m.remove());
  Modal.toast(`✅ 审计项目「${data.name}」已创建`); renderContent();
}

function updateAuditProgress(id) {
  const p = DB.get('aud_projects').find(i=>i.id===id);
  if (!p) return;
  const html = `<div style="margin-bottom:16px">
    <label style="display:block;font-size:13px;color:#4b5563;margin-bottom:6px;font-weight:500">当前进度：${p.progress}%</label>
    <input type="range" id="audit-progress" min="0" max="100" value="${p.progress}" style="width:100%" oninput="document.getElementById('ap-val').textContent=this.value+'%'">
    <div style="text-align:center;font-size:24px;font-weight:700;color:var(--primary);margin-top:8px" id="ap-val">${p.progress}%</div>
  </div>`;
  Modal.show(`更新进度 - ${p.name}`, html, {width:'420px', footer:`<button class="btn" style="background:#f3f4f6;color:#374151" onclick="Modal.close(this.closest('[id^=modal]').id)">取消</button><button class="btn btn-primary" onclick="saveAuditProgress('${id}')">保存</button>`});
}

function saveAuditProgress(id) {
  const val = parseInt(document.getElementById('audit-progress').value);
  const list = DB.get('aud_projects');
  const p = list.find(i=>i.id===id);
  if (p) { p.progress = val; p.status = val >= 100 ? '已完成' : val > 0 ? '实施中' : '计划中'; DB.set('aud_projects', list); document.querySelectorAll('[id^=modal-]').forEach(m=>m.remove()); Modal.toast(`✅ 进度更新为 ${val}%`); renderContent(); }
}

// ===== 跨系统流程引擎 =====
const WorkflowEngine = {
  key: 'portal_workflows',
  
  getAll() {
    try { return JSON.parse(localStorage.getItem(this.key)) || []; } catch { return []; }
  },
  
  save(list) { localStorage.setItem(this.key, JSON.stringify(list)); },
  
  getById(id) { return this.getAll().find(w => w.id === id); },
  
  advance(workflowId, nextStep, data = {}) {
    const list = this.getAll();
    const wf = list.find(w => w.id === workflowId);
    if (!wf) return;
    const stepDef = wf.steps.find(s => s.key === nextStep);
    if (stepDef) {
      stepDef.status = 'done';
      stepDef.doneAt = new Date().toLocaleString('zh-CN');
      stepDef.doneBy = '席宝';
      Object.assign(stepDef.data || {}, data);
    }
    // Find next pending step
    const currentIdx = wf.steps.findIndex(s => s.key === nextStep);
    if (currentIdx < wf.steps.length - 1) {
      wf.currentStep = wf.steps[currentIdx + 1].key;
    } else {
      wf.status = 'completed';
      wf.currentStep = null;
    }
    wf.updatedAt = new Date().toLocaleString('zh-CN');
    this.save(list);
  },
  
  reject(workflowId, currentStep, reason) {
    const list = this.getAll();
    const wf = list.find(w => w.id === workflowId);
    if (!wf) return;
    const step = wf.steps.find(s => s.key === currentStep);
    if (step) { step.status = 'rejected'; step.rejectReason = reason; }
    wf.status = 'rejected';
    wf.updatedAt = new Date().toLocaleString('zh-CN');
    this.save(list);
  },
  
  startWorkflow(type, title, data) {
    const list = this.getAll();
    const id = 'WF' + Date.now().toString(36).toUpperCase();
    let steps = [];
    
    if (type === 'procurement') {
      steps = [
        {key:'purchase_apply', label:'采购申请', system:'oa-system.html', status:'done', doneAt:new Date().toLocaleString('zh-CN'), doneBy:'席宝', data},
        {key:'purchase_approve', label:'采购审批', system:'oa-system.html', status:'pending'},
        {key:'contract_approve', label:'合同审批', system:'legal-system.html', status:'pending'},
        {key:'seal_apply', label:'用印申请', system:'oa-system.html', status:'pending'},
        {key:'seal_approve', label:'用印审批', system:'oa-system.html', status:'pending'},
        {key:'goods_receive', label:'到货验收', system:'inventory-system.html', status:'pending'},
        {key:'finance_pay', label:'财务付款', system:'finance-system.html', status:'pending'},
        {key:'voucher_entry', label:'凭证入账', system:'finance-system.html', status:'pending'},
      ];
    } else if (type === 'sales') {
      steps = [
        {key:'sales_contract', label:'销售合同', system:'production-system.html', status:'done', doneAt:new Date().toLocaleString('zh-CN'), doneBy:'席宝', data},
        {key:'outbound_apply', label:'出库申请', system:'inventory-system.html', status:'pending'},
        {key:'outbound_approve', label:'出库审核', system:'oa-system.html', status:'pending'},
        {key:'outbound_exec', label:'出库执行', system:'inventory-system.html', status:'pending'},
        {key:'customer_accept', label:'客户验收', system:'production-system.html', status:'pending'},
        {key:'receivable', label:'应收账款', system:'finance-system.html', status:'pending'},
        {key:'bank_confirm', label:'银行到账', system:'finance-system.html', status:'pending'},
      ];
    }
    
    const wf = {
      id, type, title, status: 'active',
      currentStep: steps.length > 1 ? steps[1].key : null,
      createdAt: new Date().toLocaleString('zh-CN'),
      updatedAt: new Date().toLocaleString('zh-CN'),
      steps
    };
    list.unshift(wf);
    this.save(list);
    return wf;
  },
  
  getPendingForSystem(systemFile) {
    return this.getAll().filter(wf => 
      wf.status === 'active' && wf.currentStep &&
      wf.steps.find(s => s.key === wf.currentStep && s.system === systemFile)
    );
  },
  
  renderProgress(wf, compact) {
    if (!wf) return '';
    const steps = wf.steps;
    return `<div style="display:flex;gap:4px;margin-bottom:16px">${steps.map((s, i) => {
      const isDone = s.status === 'done';
      const isCurrent = wf.currentStep === s.key;
      const isRejected = s.status === 'rejected';
      return `<div style="flex:1;text-align:center;padding:6px 4px;background:${isDone ? '#d1fae5' : isRejected ? '#fee2e2' : isCurrent ? '#dbeafe' : 'var(--gray-50)'};border-radius:6px;font-size:10px;border:${isCurrent ? '2px solid var(--primary)' : '1px solid transparent'}">
        <div style="font-size:12px">${isDone ? '✅' : isRejected ? '❌' : isCurrent ? '🔄' : '⏳'}</div>
        <div style="margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.label}</div>
      </div>`;
    }).join('')}</div>`;
  }
};
