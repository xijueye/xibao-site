<style>
.upload-zone{border:2px dashed var(--gray-300);border-radius:8px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;background:var(--gray-50)}
.upload-zone:hover{border-color:var(--primary);background:var(--primary-light)}
.upload-zone .icon{font-size:40px;margin-bottom:8px}
.upload-zone .text{font-size:14px;color:var(--gray-500)}
.upload-zone .hint{font-size:12px;color:var(--gray-400);margin-top:4px}
.asset-card{background:white;border-radius:8px;padding:16px;box-shadow:var(--shadow-sm);display:flex;gap:16px;align-items:center;border-left:4px solid var(--primary)}
.asset-card .icon{font-size:32px}
.asset-card .info{flex:1}
.asset-card .info h4{font-size:14px;color:var(--gray-800)}
.asset-card .info p{font-size:12px;color:var(--gray-400)}
.asset-card .value{text-align:right}
.asset-card .value .num{font-size:18px;font-weight:700;color:var(--gray-800)}
.asset-card .value .label{font-size:11px;color:var(--gray-400)}
.bank-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:13px}
.bank-row:last-child{border-bottom:none}
.match-badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
</style>
</head>

let currentTab='gl';
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
  event.target.closest('.menu-item')?.classList.add('active');
  const ab=document.getElementById('add-btn');ab.style.display='';
  const map={gl:['新建凭证',showNewVoucher],expense:['新建报销',showNewExpense],invoice:['上传发票',showUploadInvoice],report:['导出报表',()=>Modal.toast('📥 导出中...')],receivable:['-',null],payable:['-',null],asset:['新增资产',showNewAsset],budget:['-',null],bank:['-',null],settlement:['新建结算单',showNewSettlement]};
  const m=map[tab];if(m[0]==='-')ab.style.display='none';else{ab.textContent='➕ '+m[0];ab.onclick=m[1]||(()=>{});}
  const titles={gl:'📒 凭证管理',expense:'🧾 费用报销',invoice:'📄 发票台账',receivable:'📥 应收账款',payable:'📤 应付账款',asset:'🏠 固定资产',budget:'📊 预算执行',report:'📊 财务报表',bank:'🏦 银行对账',settlement:'💸 付款结算'};
  document.getElementById('page-title').textContent=titles[tab]||'';
  ({gl:renderGL,expense:renderExpense,invoice:renderInvoice,receivable:renderReceivable,payable:renderPayable,asset:renderAsset,budget:renderBudget,report:renderReport,bank:renderBank,settlement:renderSettlement})[tab]?.(document.getElementById('tab-content'));
}

function renderGL(el){
  el.innerHTML=`<div class="card"><div class="card-body"><div style="overflow-x:auto"><table><thead><tr><th>凭证号</th><th>日期</th><th>摘要</th><th>借方科目</th><th>贷方科目</th><th>金额</th><th>制单</th><th>审核</th><th>状态</th><th>操作</th></tr></thead>
  <tbody>${vouchers.map(v=>`<tr><td style="font-size:12px">${v.id}</td><td>${v.date}</td><td><strong>${v.summary}</strong></td><td style="font-size:12px">${v.debit}</td><td style="font-size:12px">${v.credit}</td><td style="font-weight:600">¥${v.amount.toLocaleString()}</td><td>${v.prepBy}</td><td>${v.authBy}</td>
  <td><span class="status ${v.status==='已审核'?'approved':'pending'}">${v.status}</span></td>
  <td><a href="#" onclick="viewVoucher('${v.id}');return false" style="color:var(--primary);font-size:13px;text-decoration:none">查看</a></td></tr>`).join('')}</tbody></table></div>
  <div style="padding:16px;text-align:center;color:var(--gray-400);font-size:13px">共 ${vouchers.length} 条凭证</div></div></div>`;
}

function renderExpense(el){
  const list=DB.get('fin_expenses');
  const pending=list.filter(i=>i.status==='待审核').length;
  const approved=list.filter(i=>i.status==='已通过');
  el.innerHTML=`<div class="portal-stats" style="margin-bottom:20px">
    <div class="stat-card"><div class="label">待审核</div><div class="value">${pending}</div></div>
    <div class="stat-card green"><div class="label">已报销总额</div><div class="value">¥${Summary.money(Summary.calc(approved,'amount'))}</div></div>
    <div class="stat-card orange"><div class="label">审批流程中</div><div class="value">${list.filter(i=>i.status.includes('已审')).length}</div></div>
  </div>
  <div class="card"><div class="card-header"><h3>报销审批流程说明</h3></div><div class="card-body padded" style="font-size:13px;color:var(--gray-600)">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <span style="padding:4px 12px;background:var(--primary-light);color:var(--primary);border-radius:4px;font-weight:600">部门经理审核</span>→
      <span style="padding:4px 12px;background:#fef3c7;color:#92400e;border-radius:4px;font-weight:600">财务审核</span>→
      <span style="padding:4px 12px;background:#d1fae5;color:#065f46;border-radius:4px;font-weight:600">CFO审批</span>→
      <span style="padding:4px 12px;background:#d1fae5;color:#065f46;border-radius:4px;font-weight:600">出纳付款</span>
    </div>
    <div style="color:var(--gray-400);font-size:12px">金额≤5000元：部门经理审批即可 | 5000-20000元：需财务审核 | ＞20000元：需CFO审批</div>
  </div></div>
  <div class="card"><div class="card-body"><table><thead><tr><th>单号</th><th>报销人</th><th>部门</th><th>类型</th><th>金额</th><th>日期</th><th>审批阶段</th><th>状态</th><th>操作</th></tr></thead>
  <tbody>${list.map(e=>{const stages=['待审核','部门经理已审','财务审核中','CFO审批','出纳付款','已通过'];const stageIdx=['待审核','部门经理已审','财务审核中','CFO审批','已通过','已驳回'].indexOf(e.status);
    return `<tr><td>${e.id}</td><td><strong>${e.applicant}</strong></td><td>${e.dept}</td><td>${e.type}</td><td style="font-weight:600">¥${e.amount.toLocaleString()}</td><td>${e.date}</td>
    <td><div style="display:flex;gap:4px">${stages.map((s,i)=>`<span style="width:8px;height:8px;border-radius:50%;background:${i<=stageIdx?'var(--success)':'var(--gray-200)'}"></span>`).join('')}</div></td>
    <td><span class="status ${e.status==='待审核'?'pending':e.status.includes('已审')?'processing':e.status==='已通过'?'approved':'rejected'}">${e.status}</span></td>
    <td>${e.status==='待审核'?`<button class="btn btn-sm btn-primary" onclick="approveExpense('${e.id}')">通过</button> <button class="btn btn-sm btn-danger" onclick="Modal.toast('❌ 已驳回','error')">驳回</button>`:`<a href="#" onclick="viewExpense('${e.id}');return false" style="color:var(--primary);font-size:13px;text-decoration:none">查看</a>`}</td></tr>`;}).join('')}</tbody></table></div></div>`;

    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <span style="padding:4px 12px;background:var(--primary-light);color:var(--primary);border-radius:4px;font-weight:600">①提交结算</span>→
      <span style="padding:4px 12px;background:#fef3c7;color:#92400e;border-radius:4px;font-weight:600">②初审（财务专员）</span>→
      <span style="padding:4px 12px;background:#e0e7ff;color:#3730a3;border-radius:4px;font-weight:600">③复审（财务经理）</span>→
      <span style="padding:4px 12px;background:#d1fae5;color:#065f46;border-radius:4px;font-weight:600">④出纳付款</span>
    </div>
    <div style="color:var(--gray-400);font-size:12px">初审核对发票与合同 → 复审审批金额与付款方式 → 出纳执行银行付款</div>
  </div></div>
  <div class="card"><div class="card-body"><div style="overflow-x:auto"><table><thead><tr><th>结算单号</th><th>供应商</th><th>摘要</th><th>金额</th><th>发票号</th><th>合同号</th><th>日期</th><th>状态</th><th>操作</th></tr></thead>
  <tbody>${list.map(s=>`<tr><td style="font-size:12px">${s.id}</td><td><strong>${s.vendor}</strong></td><td style="font-size:12px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.desc}</td>
    <td style="font-weight:600">¥${s.amount.toLocaleString()}</td><td style="font-size:12px">${s.invoiceNo}</td><td style="font-size:12px">${s.contractNo}</td><td>${s.date}</td>
    <td><span class="status ${s.status==='已付款'?'approved':s.status.includes('已审')?'processing':s.status==='已驳回'?'rejected':'pending'}">${s.status}</span></td>
    <td>${s.status==='待初审'?`<button class="btn btn-sm btn-primary" onclick="doFirstReview('${s.id}')">初审</button>`:''}${s.status==='初审通过'||s.status==='待复审'?`<button class="btn btn-sm btn-success" onclick="doSecondReview('${s.id}')">复审</button>`:''}${s.status==='复审通过'?`<button class="btn btn-sm btn-success" onclick="doPayment('${s.id}')">付款</button>`:''}
    <a href="#" onclick="viewSettlement('${s.id}');return false" style="color:var(--primary);font-size:13px;text-decoration:none;margin-left:2px">查看</a></td></tr>`).join('')}</tbody></table></div>
  <div style="padding:16px;text-align:center;color:var(--gray-400);font-size:13px">共 ${list.length} 条记录</div></div></div>`;
}
function viewSettlement(id){const s=DB.get('fin_settlements').find(x=>x.id===id);if(!s)return;
  const steps=['提交结算','初审（财务专员）','复审（财务经理）','出纳付款'];
  const sm={'待初审':0,'初审通过':1,'待复审':1,'复审通过':2,'已付款':3,'已驳回':-1};
  const cs=sm[s.status]||0;
  const html=`<div><div style="display:flex;gap:6px;margin-bottom:16px">${steps.map((st,i)=>`<div style="flex:1;text-align:center;padding:6px;background:${i<=cs?(s.status==='已驳回'?'#fee2e2':'#d1fae5'):'var(--gray-50)'};border-radius:6px;font-size:11px;font-weight:${i===cs?'700':'400'}"><div>${i<cs?'✅':i===cs?'🔄':'⏳'}</div>${st}</div>`).join('')}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:14px;margin-bottom:14px">
      <div><strong>供应商：</strong>${s.vendor}</div><div><strong>金额：</strong><span style="color:var(--primary);font-weight:700">¥${s.amount.toLocaleString()}</span></div>
      <div><strong>发票号：</strong>${s.invoiceNo}</div><div><strong>合同号：</strong>${s.contractNo}</div>
      <div><strong>日期：</strong>${s.date}</div><div><strong>付款方式：</strong>${s.paymentMethod}</div>
      <div style="grid-column:1/-1"><strong>摘要：</strong>${s.desc}</div></div>
    <div style="padding:10px;background:var(--gray-50);border-radius:8px;font-size:13px">初审人：${s.firstReviewer} | 复审人：${s.secondReviewer}</div></div>`;
  Modal.show(`💸 结算单详情 - ${s.id}`,html,{width:'560px'});
}
function doFirstReview(id){const l=DB.get('fin_settlements');const s=l.find(x=>x.id===id);if(s){s.status='初审通过';DB.set('fin_settlements',l);Modal.toast('✅ 初审通过');renderContent();}}
function doSecondReview(id){const l=DB.get('fin_settlements');const s=l.find(x=>x.id===id);if(s){s.status='复审通过';DB.set('fin_settlements',l);Modal.toast('✅ 复审通过');renderContent();}}
function doPayment(id){const l=DB.get('fin_settlements');const s=l.find(x=>x.id===id);if(s){s.status='已付款';DB.set('fin_settlements',l);Modal.toast('✅ 付款完成');renderContent();}}
function showNewSettlement(){
  const fields=[{name:'vendor',label:'供应商',required:true},{name:'desc',label:'摘要',full:true,required:true},
    {name:'amount',label:'金额',type:'number',required:true},{name:'invoiceNo',label:'发票号',required:true},
    {name:'contractNo',label:'合同号',required:true},{name:'date',label:'日期',type:'date',required:true},
    {name:'firstReviewer',label:'初审人',required:true},{name:'secondReviewer',label:'复审人',required:true},
    {name:'paymentMethod',label:'付款方式',type:'select',options:['银行转账','承兑汇票','现金','支票'],required:true}];
  const html=Form.render(fields)+`<div style="margin-top:16px;text-align:right"><button class="btn" style="background:#f3f4f6;color:#374151" onclick="Modal.close(this.closest('[id^=modal]').id)">取消</button><button class="btn btn-primary" onclick="saveSettlement()">提交结算</button></div>`;
  Modal.show('💸 新建结算单',html,{width:'580px'});
}
function saveSettlement(){const d=Form.getData();if(!d.vendor||!d.amount){Modal.toast('请填写必填项','warning');return;}const l=DB.get('fin_settlements');l.unshift({...d,id:DB.genId('JS'),status:'待初审'});DB.set('fin_settlements',l);document.querySelectorAll('[id^=modal-]').forEach(m=>m.remove());Modal.toast('✅ 结算单已提交');renderContent();}
</script>
</body>
</html>
