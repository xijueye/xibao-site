.upload-zone .icon{font-size:40px;margin-bottom:8px}
.upload-zone .text{font-size:14px;color:var(--gray-500)}
.upload-zone .hint{font-size:12px;color:var(--gray-400);margin-top:4px}
.asset-card{background:white;border-radius:8px;padding:16px;box-shadow:var(--shadow-sm);display:flex;gap:16px;align-items:center;border-left:4px solid var(--primary)}
.asset-card .icon{font-size:32px}
.asset-card .info{flex:1}
.asset-card .info h4{font-size:14px;color:var(--gray-800)}
.asset-card .info p{font-size:12px;color:var(--gray-400)}
.asset-card .value{text-align:right}
.asset-card .value .num{font-size:18px;font-weight:700;color:var(--gray-800)}
.asset-card .value .label{font-size:11px;color:var(--gray-400)}
.bank-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:13px}
.bank-row:last-child{border-bottom:none}
.match-badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
</style>

let currentTab='gl';
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
  event.target.closest('.menu-item')?.classList.add('active');
  const ab=document.getElementById('add-btn');ab.style.display='';
  const map={gl:['新建凭证',()=>Modal.toast('📝 凭证录入（模拟）')],expense:['新建报销',showNewExpense],invoice:['上传发票',showUploadInvoice],report:['导出报表',()=>Modal.toast('📥 导出中...')],receivable:['-',null],payable:['-',null],asset:['新增资产',showNewAsset],budget:['-',null],bank:['-',null]};
  const m=map[tab];if(m[0]==='-')ab.style.display='none';else{ab.textContent='➕ '+m[0];ab.onclick=m[1]||(()=>{});}
  const titles={gl:'📒 凭证管理',expense:'🧾 费用报销',invoice:'📄 发票台账',receivable:'📥 应收账款',payable:'📤 应付账款',asset:'🏠 固定资产',budget:'📊 预算执行',report:'📊 财务报表',bank:'🏦 银行对账'};
  document.getElementById('page-title').textContent=titles[tab]||'';
  ({gl:renderGL,expense:renderExpense,invoice:renderInvoice,receivable:renderReceivable,payable:renderPayable,asset:renderAsset,budget:renderBudget,report:renderReport,bank:renderBank})[tab]?.(document.getElementById('tab-content'));
}

function renderGL(el){
  el.innerHTML=`<div class="card"><div class="card-body"><table><thead><tr><th>凭证号</th><th>日期</th><th>摘要</th><th>借方科目</th><th>贷方科目</th><th>金额</th><th>制单</th><th>审核</th></tr></thead>
  <tbody>${vouchers.map(v=>`<tr><td style="font-size:12px">${v.id}</td><td>${v.date}</td><td><strong>${v.summary}</strong></td><td>${v.debit}</td><td>${v.credit}</td><td style="font-weight:600">¥${v.amount.toLocaleString()}</td><td>${v.prepBy}</td><td>${v.authBy}</td></tr>`).join('')}</tbody></table>
  <div style="padding:16px;text-align:center;color:var(--gray-400);font-size:13px">共 ${vouchers.length} 条凭证</div></div></div>`;
}

// ===== 费用报销 =====
function renderExpense(el){
  const list=DB.get('fin_expenses');
  const pending=list.filter(i=>i.status==='待审核').length;
  const approved=list.filter(i=>i.status==='已通过');
  el.innerHTML=`<div class="portal-stats" style="margin-bottom:20px">
    <div class="stat-card"><div class="label">待审核</div><div class="value">${pending}</div></div>
    <div class="stat-card green"><div class="label">已报销总额</div><div class="value">¥${Summary.money(Summary.calc(approved,'amount'))}</div></div>
    <div class="stat-card orange"><div class="label">审批流程中</div><div class="value">${list.filter(i=>i.status.includes('已审')).length}</div></div>
  </div>
  <div class="card"><div class="card-header"><h3>报销审批流程说明</h3></div><div class="card-body padded" style="font-size:13px;color:var(--gray-600)">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <span style="padding:4px 12px;background:var(--primary-light);color:var(--primary);border-radius:4px;font-weight:600">部门经理审核</span>→
      <span style="padding:4px 12px;background:#fef3c7;color:#92400e;border-radius:4px;font-weight:600">财务审核</span>→
      <span style="padding:4px 12px;background:#d1fae5;color:#065f46;border-radius:4px;font-weight:600">CFO审批</span>→
      <span style="padding:4px 12px;background:#d1fae5;color:#065f46;border-radius:4px;font-weight:600">出纳付款</span>
    </div>
    <div style="color:var(--gray-400);font-size:12px">金额≤5000元：部门经理审批即可 | 5000-20000元：需财务审核 | ＞20000元：需CFO审批</div>
  </div></div>
  <div class="card"><div class="card-body"><table><thead><tr><th>单号</th><th>报销人</th><th>部门</th><th>类型</th><th>金额</th><th>日期</th><th>审批阶段</th><th>状态</th><th>操作</th></tr></thead>
  <tbody>${list.map(e=>{const stages=['待审核','部门经理已审','财务审核中','CFO审批','出纳付款','已通过'];const stageIdx=['待审核','部门经理已审','财务审核中','CFO审批','已通过','已驳回'].indexOf(e.status);
    return `<tr><td>${e.id}</td><td><strong>${e.applicant}</strong></td><td>${e.dept}</td><td>${e.type}</td><td style="font-weight:600">¥${e.amount.toLocaleString()}</td><td>${e.date}</td>
    <td><div style="display:flex;gap:4px">${stages.map((s,i)=>`<span style="width:8px;height:8px;border-radius:50%;background:${i<=stageIdx?'var(--success)':'var(--gray-200)'}"></span>`).join('')}</div></td>
    <td><span class="status ${e.status==='待审核'?'pending':e.status.includes('已审')?'processing':e.status==='已通过'?'approved':'rejected'}">${e.status}</span></td>
    <td>${e.status==='待审核'?`<button class="btn btn-sm btn-primary" onclick="approveExpense('${e.id}')">通过</button> <button class="btn btn-sm btn-danger" onclick="Modal.toast('❌ 已驳回','error')">驳回</button>`:`<a href="#" onclick="viewExpense('${e.id}');return false" style="color:var(--primary);font-size:13px;text-decoration:none">查看</a>`}</td></tr>`;}).join('')}</tbody></table></div></div>`;
}
function showNewExpense(){
  const fields=[{name:'type',label:'报销类型',type:'select',options:['差旅费','办公费','招待费','交通费','培训费','通讯费'],required:true},{name:'amount',label:'总金额（元）',type:'number',required:true},
  {name:'desc1',label:'费用明细1',required:true},{name:'amount1',label:'金额1',type:'number',required:true},
  {name:'desc2',label:'费用明细2'},{name:'amount2',label:'金额2',type:'number'},
  {name:'remark',label:'备注',type:'textarea',full:true}];
  const html=Form.render(fields)+`<div style="margin-top:16px;text-align:right"><button class="btn" style="background:#f3f4f6;color:#374151" onclick="Modal.close(this.closest('[id^=modal]').id)">取消</button><button class="btn btn-primary" onclick="submitExpense()">提交报销</button></div>`;
  Modal.show('📝 新建报销单',html,{width:'560px'});
}
function submitExpense(){const d=Form.getData();if(!d.type||!d.amount){Modal.toast('请填写必填项','warning');return;}const l=DB.get('fin_expenses');l.unshift({id:DB.genId('BX'),applicant:'席宝',dept:'人力资源部',type:d.type,amount:parseFloat(d.amount),date:new Date().toISOString().slice(0,10),status:'待审核',items:[{desc:d.desc1,amount:parseFloat(d.amount1)||0}],level:1});DB.set('fin_expenses',l);document.querySelectorAll('[id^=modal-]').forEach(m=>m.remove());Modal.toast('✅ 已提交');currentTab='expense';renderContent();}
function approveExpense(id){const l=DB.get('fin_expenses');const i=l.find(x=>x.id===id);if(i){i.status='部门经理已审';DB.set('fin_expenses',l);Modal.toast('✅ 审批通过');renderContent();}}
function viewExpense(id){const e=DB.get('fin_expenses').find(i=>i.id===id);if(!e)return;Modal.show(`报销单 ${e.id}`,`<div style="font-size:14px"><p><strong>报销人：</strong>${e.applicant} | <strong>类型：</strong>${e.type} | <strong>金额：</strong>¥${e.amount.toLocaleString()}</p><p><strong>状态：</strong><span class="status ${e.status==='已通过'?'approved':'pending'}">${e.status}</span></p></div>`,{width:'480px'});}

// ===== 发票管理 =====
function renderInvoice(el){
  const list=DB.get('fin_invoices');
  el.innerHTML=`<div class="portal-stats" style="margin-bottom:20px">
    <div class="stat-card"><div class="label">待认证进项</div><div class="value">${list.filter(i=>i.direction==='进项'&&i.status==='待认证').length}</div></div>
    <div class="stat-card green"><div class="label">本月销项</div><div class="value">${list.filter(i=>i.direction==='销项').length}张</div></div>
    <div class="stat-card"><div class="label">发票总额（万元）</div><div class="value">${(Summary.calc(list,'amount')/10000).toFixed(1)}</div></div>
  </div>
  <div class="card"><div class="card-body"><table><thead><tr><th>发票号码</th><th>类型</th><th>方向</th><th>对方单位</th><th>金额</th><th>税额</th><th>价税合计</th><th>状态</th><th>操作</th></tr></thead>
  <tbody>${list.map(i=>`<tr><td>${i.number}</td><td>${i.type}</td><td><span class="status ${i.direction==='销项'?'processing':'approved'}">${i.direction}</span></td>
  <td>${i.counterparty}</td><td>¥${i.amount.toLocaleString()}</td><td>¥${i.tax.toLocaleString()}</td><td style="font-weight:600">¥${(i.amount+i.tax).toLocaleString()}</td>
  <td><span class="status ${i.status==='正常'||i.status==='已认证'?'approved':i.status==='待认证'?'pending':'danger'}">${i.status}</span></td>
  <td>${i.status==='待认证'?`<button class="btn btn-sm btn-success" onclick="certifyInv('${i.id}')">认证</button>`:`<a href="#" onclick="viewInv('${i.id}');return false" style="color:var(--primary);font-size:13px;text-decoration:none">查看</a>`}</td></tr>`).join('')}</tbody></table></div></div>`;
}
function showUploadInvoice(){
  const html=`<div class="upload-zone" onclick="simulateUpload()">
    <div class="icon">📤</div>
    <div class="text">点击上传发票文件</div>
    <div class="hint">支持 JPG、PNG、PDF 格式，支持 OCR 智能识别</div>
  </div>
  <div style="margin-top:16px"><h4 style="font-size:14px;margin-bottom:8px">或手动录入</h4>
  ${Form.render([
    {name:'number',label:'发票号码',required:true},{name:'code',label:'发票代码'},
    {name:'type',label:'类型',type:'select',options:['增值税专票','增值税普票','电子普票'],required:true},
    {name:'direction',label:'方向',type:'select',options:['销项','进项'],required:true},
    {name:'counterparty',label:'对方单位',full:true,required:true},
    {name:'amount',label:'金额',type:'number',required:true},{name:'tax',label:'税额',type:'number'},
    {name:'date',label:'开票日期',type:'date',required:true}
  ])}</div>
  <div style="margin-top:16px;text-align:right"><button class="btn" style="background:#f3f4f6;color:#374151" onclick="Modal.close(this.closest('[id^=modal]').id)">取消</button><button class="btn btn-primary" onclick="saveInvUpload()">保存</button></div>`;
  Modal.show('📤 发票上传',html,{width:'600px'});
}
function simulateUpload(){Modal.toast('📸 OCR识别中...','info');setTimeout(()=>{Modal.toast('✅ 已识别发票信息，已填入表单');},1500);}
function saveInvUpload(){const d=Form.getData();if(!d.number){Modal.toast('请填写发票号码','warning');return;}const l=DB.get('fin_invoices');l.unshift({...d,id:DB.genId('INV'),amount:parseFloat(d.amount)||0,tax:parseFloat(d.tax)||0,status:'正常',uploadDate:new Date().toISOString().slice(0,10)});DB.set('fin_invoices',l);document.querySelectorAll('[id^=modal-]').forEach(m=>m.remove());Modal.toast('✅ 发票已登记');currentTab='invoice';renderContent();}
function certifyInv(id){const l=DB.get('fin_invoices');const i=l.find(x=>x.id===id);if(i){i.status='已认证';DB.set('fin_invoices',l);Modal.toast('✅ 认证成功');renderContent();}}
function viewInv(id){const i=DB.get('fin_invoices').find(x=>x.id===id);if(!i)return;Modal.show(`发票详情`,`<div style="font-size:14px"><p><strong>号码：</strong>${i.number} | <strong>类型：</strong>${i.type}</p><p><strong>对方：</strong>${i.counterparty}</p><p><strong>金额：</strong>¥${i.amount.toLocaleString()} | <strong>税额：</strong>¥${i.tax.toLocaleString()}</p><p><strong>价税合计：</strong><span style="color:var(--primary);font-weight:700">¥${(i.amount+i.tax).toLocaleString()}</span></p></div>`,{width:'480px'});}

// ===== 固定资产 =====
function renderAsset(el){
  const list=DB.get('fin_assets');
  const totalCost=Summary.calc(list,'cost');
  const totalDepr=list.reduce((s,a)=>s+(a.cost-a.cost*a.residual/100)*(1-a.remainMonths/(a.usefulLife*12)),0);
  el.innerHTML=`<div class="portal-stats" style="margin-bottom:20px">
    <div class="stat-card"><div class="label">资产原值（万元）</div><div class="value">${(totalCost/10000).toFixed(1)}</div></div>
    <div class="stat-card green"><div class="label">累计折旧（万元）</div><div class="value">${(totalDepr/10000).toFixed(1)}</div></div>
    <div class="stat-card"><div class="label">净值（万元）</div><div class="value">${((totalCost-totalDepr)/10000).toFixed(1)}</div></div>
    <div class="stat-card orange"><div class="label">资产数量</div><div class="value">${list.length}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
  ${list.map(a=>{const bookValue=a.cost*(1-a.residual/100)*(a.remainMonths/(a.usefulLife*12));return `<div class="asset-card">
    <div class="icon">${a.category==='车辆'?'🚗':a.category==='电子设备'?'💻':a.category==='网络设备'?'🌐':a.category==='服务器'?'🖥️':a.category==='办公设备'?'🖨️':'🪑'}</div>
    <div class="info"><h4>${a.name}</h4><p>${a.category} | ${a.dept} | ${a.depreciationMethod}</p><p>购入：${a.buyDate} | 使用：${a.usefulLife}年 | 残值率：${a.residual}%</p></div>
    <div class="value"><div class="num">¥${(bookValue/10000).toFixed(1)}万</div><div class="label">净值/原值¥${(a.cost/10000).toFixed(1)}万</div></div></div>`;}).join('')}</div>`;
}
function showNewAsset(){
  const fields=[{name:'name',label:'资产名称',full:true,required:true},{name:'category',label:'类别',type:'select',options:['电子设备','网络设备','服务器','办公设备','家具','车辆'],required:true},
  {name:'dept',label:'使用部门',type:'select',options:['技术研发部','市场营销部','生产制造部','行政综合部','财务管理部','项目交付部'],required:true},
  {name:'cost',label:'购入原值（元）',type:'number',required:true},{name:'usefulLife',label:'使用年限',type:'number',required:true},
  {name:'buyDate',label:'购入日期',type:'date',required:true}];
  const html=Form.render(fields)+`<div style="margin-top:16px;text-align:right"><button class="btn" style="background:#f3f4f6;color:#374151" onclick="Modal.close(this.closest('[id^=modal]').id)">取消</button><button class="btn btn-primary" onclick="saveAsset()">入账</button></div>`;
  Modal.show('➕ 新增固定资产',html,{width:'560px'});}
function saveAsset(){const d=Form.getData();if(!d.name){Modal.toast('请填写资产名称','warning');return;}const l=DB.get('fin_assets');l.unshift({...d,id:DB.genId('FA'),cost:parseFloat(d.cost),usefulLife:parseInt(d.usefulLife),depreciationMethod:'直线法',residual:5,monthlyDepr:parseFloat(d.cost)*(1-0.05)/(parseInt(d.usefulLife)*12),remainMonths:parseInt(d.usefulLife)*12,status:'使用中'});DB.set('fin_assets',l);document.querySelectorAll('[id^=modal-]').forEach(m=>m.remove());Modal.toast('✅ 资产已入账');renderContent();}

// ===== 应收/应付/预算/报表/银行 =====

function renderBudget(el){
  const total=Summary.calc(budgets,'total'),used=Summary.calc(budgets,'used');
  el.innerHTML=`<div class="portal-stats" style="margin-bottom:20px"><div class="stat-card"><div class="label">总预算（万元）</div><div class="value">${total}</div></div><div class="stat-card green"><div class="label">已执行</div><div class="value">${used.toFixed(1)}</div></div><div class="stat-card"><div class="label">执行率</div><div class="value">${(used/total*100).toFixed(1)}%</div></div></div>
  <div class="card"><div class="card-body">${budgets.map(b=>{const rate=(b.used/b.total*100).toFixed(1);return `<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${b.dept}</span><span style="font-weight:600">¥${b.used}万/¥${b.total}万 (${rate}%)</span></div><div class="progress-bar"><div class="fill ${rate>80?'red':rate>60?'orange':'green'}" style="width:${rate}%"></div></div></div>`;}).join('')}</div></div>`;}
