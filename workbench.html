<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作台 - 华信集团</title>
<link rel="stylesheet" href="assets/style.css">
<style>
.wb-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.task-card{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--gray-100);cursor:pointer;transition:background .15s}
.task-card:hover{background:var(--gray-50)}
.task-card:last-child{border-bottom:none}
.task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.task-dot.red{background:var(--danger)}.task-dot.orange{background:var(--warning)}.task-dot.blue{background:var(--primary)}.task-dot.green{background:var(--success)}
.task-info .title{font-size:14px;color:var(--gray-800)}
.task-info .meta{font-size:12px;color:var(--gray-400);margin-top:2px}
.task-actions{margin-left:auto;display:flex;gap:6px;flex-shrink:0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-header{font-size:11px;color:var(--gray-400);padding:4px 0}
.cal-day{padding:6px 0;font-size:12px;border-radius:4px;cursor:pointer}
.cal-day:hover{background:var(--gray-100)}
.cal-day.today{background:var(--primary);color:white;font-weight:700}
.cal-day.has-event{position:relative}
.cal-day.has-event::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--danger)}
.cal-day.empty{opacity:0}
.kpi-row{display:flex;gap:12px;margin-bottom:16px}
.kpi-box{flex:1;background:white;border-radius:8px;padding:14px;box-shadow:var(--shadow-sm);text-align:center}
.kpi-box .num{font-size:24px;font-weight:700}
.kpi-box .label{font-size:11px;color:var(--gray-400);margin-top:2px}
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--gray-100);font-size:13px}
.doc-item:last-child{border-bottom:none}
.doc-icon{font-size:20px}
.doc-info .name{color:var(--gray-700);font-weight:500}
.doc-info .time{color:var(--gray-400);font-size:11px}
.wf-mini{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--gray-100);font-size:13px}
.wf-mini:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><span class="icon">🏢</span><span>华信集团 · 统一业务门户</span></div>
  <div class="nav-links">
    <a href="index.html">门户首页</a>
    <a href="workbench.html" class="active">工作台</a>
    <a href="messages.html">消息中心</a>
    <a href="analytics.html">数据分析</a>
  </div>
  <div class="user-info"><div class="avatar">席</div><span>席宝</span></div>
</div>
<div style="padding:24px;max-width:1400px;margin:0 auto">
  <div id="kpi-area"></div>
  <div class="wb-grid">
    <div><div class="card"><div class="card-header"><h3>📋 我的待办任务</h3><span style="font-size:13px;color:var(--primary);cursor:pointer" onclick="location.href='oa-system.html'">查看全部 →</span></div><div class="card-body" style="padding:0" id="task-list"></div></div></div>
    <div>
      <div class="card"><div class="card-header"><h3>🔄 流程动态</h3><span style="font-size:13px;color:var(--primary);cursor:pointer" onclick="location.href='workflow.html'">查看全部 →</span></div><div class="card-body" style="padding:8px 16px" id="wf-list"></div></div>
      <div class="card" style="margin-top:20px"><div class="card-header"><h3>📅 日程</h3></div><div class="card-body padded">
        <div class="cal-grid"><div class="cal-header">日</div><div class="cal-header">一</div><div class="cal-header">二</div><div class="cal-header">三</div><div class="cal-header">四</div><div class="cal-header">五</div><div class="cal-header">六</div>
        <div class="cal-day empty"></div><div class="cal-day empty"></div><div class="cal-day">1</div><div class="cal-day">2</div><div class="cal-day">3</div><div class="cal-day">4</div><div class="cal-day">5</div>
        <div class="cal-day">6</div><div class="cal-day">7</div><div class="cal-day">8</div><div class="cal-day">9</div><div class="cal-day">10</div><div class="cal-day">11</div><div class="cal-day">12</div>
        <div class="cal-day">13</div><div class="cal-day">14</div><div class="cal-day has-event">15</div><div class="cal-day has-event">16</div><div class="cal-day has-event">17</div><div class="cal-day today">18</div><div class="cal-day">19</div>
        <div class="cal-day has-event">20</div><div class="cal-day">21</div><div class="cal-day">22</div><div class="cal-day">23</div><div class="cal-day">24</div><div class="cal-day">25</div><div class="cal-day">26</div>
        <div class="cal-day">27</div><div class="cal-day">28</div><div class="cal-day">29</div><div class="cal-day">30</div><div class="cal-day empty"></div><div class="cal-day empty"></div><div class="cal-day empty"></div></div>
        <div style="margin-top:12px;font-size:12px;color:var(--gray-500)"><div style="margin-bottom:4px">📌 <strong>6/20</strong> 增值税申报截止</div><div style="margin-bottom:4px">📌 <strong>6/22</strong> 集团年中会议</div><div>📌 <strong>6/30</strong> Q2预算截止</div></div>
      </div></div>
      <div class="card" style="margin-top:20px"><div class="card-header"><h3>⚡ 快捷入口</h3></div><div class="card-body padded" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <a href="oa-system.html" style="display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;text-decoration:none;color:var(--gray-700);font-size:13px;background:var(--gray-50)">📝 发起审批</a>
        <a href="finance-system.html" style="display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;text-decoration:none;color:var(--gray-700);font-size:13px;background:var(--gray-50)">💰 费用报销</a>
        <a href="hr-system.html" style="display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;text-decoration:none;color:var(--gray-700);font-size:13px;background:var(--gray-50)">👥 人事服务</a>
        <a href="inventory-system.html" style="display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;text-decoration:none;color:var(--gray-700);font-size:13px;background:var(--gray-50)">📦 库存查询</a>
        <a href="workflow.html" style="display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;text-decoration:none;color:var(--gray-700);font-size:13px;background:var(--gray-50)">🔄 流程中心</a>
        <a href="tax-system.html" style="display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;text-decoration:none;color:var(--gray-700);font-size:13px;background:var(--gray-50)">🧾 税务申报</a>
      </div></div>
    </div>
  </div>
  <div class="footer">华信集团 · 统一业务管理平台 © 2026</div>
</div>
<script src="assets/app.js"></script>
<script>
// ===== 动态加载所有系统数据 =====
function get(key, def) { try { return JSON.parse(localStorage.getItem('portal_' + key)) || def; } catch { return def; } }

function buildTaskList() {
  const tasks = [];
  // OA待审批
  const oa = get('oa_approvals', []);
  oa.filter(i => i.status === '待审批').forEach(i => {
    const icon = {请假:'🏖️',用车:'🚗',用印:'📮',出差:'✈️',招待:'🍽️',采购:'🛒'}[i.type] || '📝';
    const dot = i.urgency === '紧急' ? 'red' : 'orange';
    tasks.push({dot, icon, title:`${i.applicant} ${i.summary}`, meta:`OA审批 · ${i.date}`, link:'oa-system.html', btn:'通过', btnClass:'btn-primary'});
  });
  // 费用报销待审
  const expenses = get('fin_expenses', []);
  expenses.filter(i => i.status === '待审核').forEach(i => {
    tasks.push({dot:'orange', icon:'🧾', title:`${i.applicant} ${i.type}报销 ¥${i.amount.toLocaleString()}`, meta:`财务云 · ${i.date}`, link:'finance-system.html', btn:'审核', btnClass:'btn-primary'});
  });
  // 法务合同待审
  const contracts = get('leg_contracts', []);
  contracts.filter(i => i.status === '待审核' || i.status === '审核中').forEach(i => {
    tasks.push({dot:'red', icon:'⚖️', title:`${i.name} 法务审核`, meta:`法务管理 · ${i.date}`, link:'legal-system.html', btn:'审核', btnClass:'btn-primary'});
  });
  // 入库待验收
  const inbounds = get('inv_inbounds', []);
  inbounds.filter(i => i.status === '待验收').forEach(i => {
    tasks.push({dot:'orange', icon:'📦', title:`${i.item} ${i.qty}件 待验收入库`, meta:`出入库 · ${i.date}`, link:'inventory-system.html', btn:'验收', btnClass:'btn-success'});
  });
  // 税务申报
  const filings = get('tax_filings', []);
  filings.filter(i => i.status === '待申报').forEach(i => {
    tasks.push({dot:'red', icon:'🧾', title:`${i.tax}（${i.period}）申报截止${i.deadline}`, meta:`税务管理`, link:'tax-system.html', btn:'申报', btnClass:'btn-warning'});
  });
  // 库存预警
  const stock = get('inv_stock', []);
  stock.filter(i => i.qty < i.safety).forEach(i => {
    tasks.push({dot:'orange', icon:'⚠️', title:`库存预警：${i.name} 仅剩${i.qty}${i.unit}（安全库存${i.safety}）`, meta:'出入库系统', link:'inventory-system.html', btn:'查看', btnClass:'btn-outline'});
  });
  // 审计问题未整改
  const issues = get('aud_issues', []);
  issues.filter(i => i.status === '未整改').forEach(i => {
    tasks.push({dot:'blue', icon:'🔍', title:`审计问题：${i.desc.substring(0,25)}...`, meta:`审计管理 · 整改期限${i.deadline}`, link:'audit-system.html', btn:'查看', btnClass:'btn-outline'});
  });
  // 采购待审
  const purchases = get('biz_purchases', []);
  purchases.filter(i => i.status === '待审批').forEach(i => {
    tasks.push({dot:'orange', icon:'🛒', title:`${i.applicant} 采购申请 ${i.item.substring(0,20)}`, meta:`生产经营 · ¥${i.amount.toLocaleString()}`, link:'production-system.html', btn:'审批', btnClass:'btn-primary'});
  });
  return tasks;
}

function renderWorkbench() {
  const tasks = buildTaskList();
  // KPI
  const oa = get('oa_approvals', []);
  const pendingOA = oa.filter(i => i.status === '待审批').length;
  const expenses = get('fin_expenses', []);
  const pendingExp = expenses.filter(i => i.status === '待审核').length;
  const projects = get('biz_projects', []);
  const activeProjects = projects.filter(i => i.status === '进行中').length;
  const stock = get('inv_stock', []);
  const warnings = stock.filter(i => i.qty < i.safety).length;
  
  document.getElementById('kpi-area').innerHTML = `<div class="kpi-row">
    <div class="kpi-box"><div class="num" style="color:var(--danger)">${tasks.length}</div><div class="label">待处理任务</div></div>
    <div class="kpi-box"><div class="num" style="color:var(--warning)">${pendingOA}</div><div class="label">待审批事项</div></div>
    <div class="kpi-box"><div class="num" style="color:var(--primary)">${activeProjects}</div><div class="label">进行中项目</div></div>
    <div class="kpi-box"><div class="num" style="color:var(--success)">${expenses.filter(i=>i.status==='已通过').length}</div><div class="label">已报销</div></div>
    <div class="kpi-box"><div class="num" style="color:${warnings>0?'var(--danger)':'var(--success)'}">${warnings}</div><div class="label">库存预警</div></div>
  </div>`;
  
  // Task list
  const taskEl = document.getElementById('task-list');
  if (tasks.length === 0) {
    taskEl.innerHTML = '<div style="padding:60px;text-align:center;color:var(--gray-400)">🎉 暂无待办</div>';
  } else {
    taskEl.innerHTML = tasks.slice(0, 15).map(t => `<div class="task-card" onclick="location.href='${t.link}'">
      <div class="task-dot ${t.dot}"></div>
      <div class="task-info"><div class="title">${t.title}</div><div class="meta">${t.meta}</div></div>
      <div class="task-actions"><button class="btn btn-sm ${t.btnClass}" onclick="event.stopPropagation();location.href='${t.link}'">${t.btn}</button></div>
    </div>`).join('') + (tasks.length > 15 ? `<div style="padding:12px;text-align:center"><a href="oa-system.html" style="color:var(--primary);font-size:13px">还有 ${tasks.length-15} 条待办，查看全部 →</a></div>` : '');
  }
  
  // Workflow mini
  let wfList = [];
  try { wfList = JSON.parse(localStorage.getItem('portal_workflows')) || []; } catch { wfList = []; }
  const activeWf = wfList.filter(w => w.status === 'active');
  const wfEl = document.getElementById('wf-list');
  if (activeWf.length === 0) {
    wfEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--gray-400);font-size:13px">暂无进行中流程</div>';
  } else {
    wfEl.innerHTML = activeWf.map(wf => {
      const done = wf.steps.filter(s => s.status === 'done').length;
      const total = wf.steps.length;
      const pct = Math.round(done/total*100);
      return `<div class="wf-mini" onclick="location.href='workflow.html'" style="cursor:pointer">
        <div style="width:36px;height:36px;border-radius:50%;background:${wf.type==='procurement'?'#dbeafe':'#d1fae5'};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${wf.type==='procurement'?'🛒':'📈'}</div>
        <div style="flex:1;min-width:0"><div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${wf.title}</div>
        <div style="font-size:11px;color:var(--gray-400);margin-top:2px">${done}/${total}步 · ${pct}%</div></div>
        <span class="status processing" style="flex-shrink:0;font-size:11px">进行中</span>
      </div>`;
    }).join('');
  }
}

renderWorkbench();
</script>
</body>
</html>
